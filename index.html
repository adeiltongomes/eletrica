<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>⚡ AccertTech — Orçamentos Elétrica</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon.svg">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="AccertTech">
<meta name="theme-color" content="#0F1117">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Segoe UI',system-ui,sans-serif;background:#0F1117;color:#E8EDF5;font-size:14px}
:root{
  --bg:#0F1117;--sb:#13171F;--card:#1A1F2E;--card2:#1E2535;
  --b:#252D40;--b2:#2E3850;--b3:#3A4660;
  --pri:#2196F3;--prid:#1565C0;--pril:#42A5F5;
  --acc:#FFB300;--suc:#4CAF50;--wrn:#FF9800;--dan:#F44336;
  --txt:#E8EDF5;--txt2:#B0BCCF;--txt3:#6B7A94;--txt4:#3D4A62;
  --r:10px;--rs:6px;--sh:0 4px 24px rgba(0,0,0,.4);--sw:220px
}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--b2);border-radius:10px}
.app{display:flex;height:100vh;overflow:hidden}
.sidebar{width:var(--sw);background:var(--sb);border-right:1px solid var(--b);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto;transition:transform .2s}
.main{flex:1;overflow-y:auto;display:flex;flex-direction:column;min-width:0}
.topbar{background:var(--card);border-bottom:1px solid var(--b);padding:0 22px;height:54px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.content{padding:22px;flex:1}
.sb-logo{padding:18px 16px 14px;border-bottom:1px solid var(--b);display:flex;align-items:center;gap:10px}
.sb-logo-icon{font-size:24px;flex-shrink:0}
.sb-logo-name{font-size:14px;font-weight:800;color:var(--txt);line-height:1.2}
.sb-logo-sub{font-size:9px;color:var(--txt3);letter-spacing:1.5px;text-transform:uppercase}
.sb-nav{padding:10px 6px;flex:1}
.sb-sec{font-size:9px;font-weight:700;letter-spacing:1.8px;text-transform:uppercase;color:var(--txt4);padding:10px 10px 4px}
.sb-item{display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:var(--rs);cursor:pointer;color:var(--txt2);font-size:13px;font-weight:500;transition:all .15s;margin-bottom:1px;border:none;background:none;width:100%;text-align:left}
.sb-item:hover{background:var(--card);color:var(--txt)}
.sb-item.active{background:rgba(33,150,243,.15);color:var(--pri);font-weight:700}
.sb-item .ico{font-size:15px;width:18px;text-align:center;flex-shrink:0}
.sb-bdg{margin-left:auto;background:var(--pri);color:#fff;font-size:9px;font-weight:700;padding:2px 6px;border-radius:10px;min-width:18px;text-align:center}
.sb-bdg.red{background:var(--dan)}
.sb-bot{padding:10px 6px;border-top:1px solid var(--b)}
.pg-title{font-size:16px;font-weight:700;color:var(--txt)}
/* Chat */
.chat-wrap{position:fixed;top:54px;left:var(--sw);right:0;bottom:0;display:flex;flex-direction:column;background:var(--bg);z-index:5}
@media(max-width:720px){.chat-wrap{left:0;top:50px;bottom:calc(66px + env(safe-area-inset-bottom,0px))}}
.chat-msgs{flex:1;overflow-y:auto;padding:16px 18px;display:flex;flex-direction:column;gap:4px}
.chat-empty{text-align:center;color:var(--txt4);padding:50px 20px;line-height:1.9;font-size:13px}
.chat-day-sep{text-align:center;font-size:10px;color:var(--txt4);margin:12px 0;text-transform:capitalize;letter-spacing:.4px}
.chat-row{display:flex;flex-direction:column;max-width:78%;margin-bottom:4px}
.chat-row-me{align-self:flex-end;align-items:flex-end}
.chat-row-them{align-self:flex-start;align-items:flex-start}
.chat-sender{font-size:10px;color:var(--txt3);margin-bottom:2px;padding:0 5px}
.chat-bubble{padding:9px 13px;border-radius:16px;font-size:13px;line-height:1.55;word-break:break-word;white-space:pre-wrap}
.chat-mine{background:var(--pri);color:#fff;border-bottom-right-radius:4px}
.chat-theirs{background:var(--card2);color:var(--txt);border:1px solid var(--b);border-bottom-left-radius:4px}
.chat-time{font-size:10px;color:var(--txt4);margin-top:2px;padding:0 5px}
.chat-bar{display:flex;gap:8px;padding:12px 16px;border-top:1px solid var(--b);background:var(--card);flex-shrink:0}
.chat-bar input{flex:1;margin:0}
.menu-btn{display:none;background:none;border:none;color:var(--txt2);font-size:20px;cursor:pointer;padding:4px}
.card{background:var(--card);border:1px solid var(--b);border-radius:var(--r);padding:18px}
.card-sm{padding:14px 16px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.metric-ico{font-size:20px;margin-bottom:8px}
.metric-val{font-size:24px;font-weight:800;color:var(--txt);line-height:1}
.metric-lbl{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--txt3);margin-top:4px}
.metric-sub{font-size:11px;color:var(--txt3);margin-top:3px}
.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th{padding:9px 12px;background:var(--card2);color:var(--txt3);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;text-align:left;border-bottom:1px solid var(--b);white-space:nowrap}
.tbl td{padding:10px 12px;border-bottom:1px solid var(--b);color:var(--txt2);vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:rgba(33,150,243,.04);cursor:pointer}
.tbl-wrap{overflow-x:auto;border-radius:var(--r);border:1px solid var(--b)}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 15px;border-radius:var(--rs);font-size:13px;font-weight:600;cursor:pointer;border:1.5px solid transparent;transition:all .15s;font-family:inherit;line-height:1;white-space:nowrap}
.btn-p{background:var(--pri);color:#fff;border-color:var(--pri)}.btn-p:hover{background:var(--prid)}
.btn-o{background:transparent;color:var(--txt2);border-color:var(--b2)}.btn-o:hover{background:var(--card2);color:var(--txt)}
.btn-s{background:var(--suc);color:#fff;border-color:var(--suc)}
.btn-d{background:var(--dan);color:#fff;border-color:var(--dan)}
.btn-w{background:var(--wrn);color:#1A1A1A;border-color:var(--wrn)}
.btn-a{background:var(--acc);color:#1A1A1A;border-color:var(--acc)}
.btn-g{background:transparent;color:var(--txt3);border-color:transparent;padding:6px 10px}.btn-g:hover{color:var(--txt);background:var(--card2)}
.btn-sm{padding:5px 11px;font-size:12px}.btn-xs{padding:3px 8px;font-size:11px;border-radius:4px}
.btn-ico{padding:7px;border-radius:var(--rs)}
label{display:block;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--txt3);margin-bottom:4px}
input,select,textarea{width:100%;padding:9px 11px;background:#0A0D14;border:1.5px solid var(--b2);border-radius:var(--rs);color:var(--txt);font-size:13px;font-family:inherit;outline:none;transition:border .15s}
input:focus,select:focus,textarea:focus{border-color:var(--pri)}
input::placeholder,textarea::placeholder{color:var(--txt4)}
select option{background:var(--card)}
textarea{resize:vertical;min-height:70px}
.fr{display:grid;gap:12px;margin-bottom:12px}.fr.c2{grid-template-columns:1fr 1fr}.fr.c3{grid-template-columns:1fr 1fr 1fr}.fr.c4{grid-template-columns:1fr 1fr 1fr 1fr}
.fg{display:flex;flex-direction:column}
.bdg{display:inline-flex;align-items:center;gap:3px;padding:3px 8px;border-radius:20px;font-size:10px;font-weight:700;text-transform:uppercase}
.bdg-b{background:rgba(33,150,243,.15);color:#42A5F5}
.bdg-g{background:rgba(76,175,80,.15);color:#66BB6A}
.bdg-y{background:rgba(255,179,0,.15);color:var(--acc)}
.bdg-r{background:rgba(244,67,54,.15);color:#EF5350}
.bdg-gr{background:rgba(107,122,148,.15);color:#8A9BB5}
.bdg-o{background:rgba(255,152,0,.15);color:#FFA726}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:1000;align-items:center;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:var(--card);border:1px solid var(--b2);border-radius:14px;width:min(680px,95vw);max-height:92vh;overflow-y:auto;overflow-x:hidden;box-shadow:var(--sh);animation:fu .2s ease;display:flex;flex-direction:column}
.modal-w{width:min(860px,95vw)}.modal-xl{width:min(1050px,97vw)}
.mhdr{padding:18px 20px 14px;border-bottom:1px solid var(--b);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--card);z-index:2;flex-shrink:0}
.mtitle{font-size:15px;font-weight:700;color:var(--txt)}
.mbody{padding:18px 20px;flex:1;overflow-y:auto;overflow-x:hidden;min-height:0}
.mfoot{padding:12px 20px;border-top:1px solid var(--b);display:flex;gap:8px;justify-content:flex-end;position:sticky;bottom:0;background:var(--card);flex-shrink:0}
@keyframes fu{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.chip{display:inline-flex;align-items:center;gap:3px;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600;background:var(--card2);border:1px solid var(--b);color:var(--txt3);cursor:pointer;transition:all .15s;user-select:none}
.chip.sel{background:rgba(33,150,243,.18);border-color:var(--pri);color:var(--pril)}
.chip:hover:not(.sel){border-color:var(--txt3);color:var(--txt2)}
.chips{display:flex;flex-wrap:wrap;gap:5px}
.divider{height:1px;background:var(--b);margin:14px 0}
.sh{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.stitle{font-size:14px;font-weight:700;color:var(--txt)}
.ssub{font-size:11px;color:var(--txt3);margin-top:1px}
.empty{text-align:center;padding:50px 20px;color:var(--txt3)}
.empty-ico{font-size:40px;margin-bottom:10px}
.empty-t{font-size:14px;font-weight:600;color:var(--txt2);margin-bottom:5px}
.empty-s{font-size:12px}
#toast{position:fixed;bottom:22px;right:22px;z-index:9999;display:flex;flex-direction:column;gap:7px;pointer-events:none}
.ti{padding:11px 16px;border-radius:9px;font-size:13px;font-weight:600;opacity:0;transform:translateX(18px);transition:all .3s;max-width:300px;display:flex;align-items:center;gap:7px}
.ti-ok{background:#1B5E20;border:1px solid #2E7D32;color:#A5D6A7}
.ti-w{background:#B71C1C;border:1px solid#C62828;color:#EF9A9A}
.ti-i{background:#0D47A1;border:1px solid #1565C0;color:#90CAF9}
.ti-show{opacity:1;transform:translateX(0)}
#loginOv{position:fixed;inset:0;background:#080A10;z-index:5000;display:flex;align-items:center;justify-content:center}
.lbox{background:var(--card);border:1px solid var(--b2);border-radius:16px;padding:34px 38px;width:min(360px,90vw);text-align:center}
.lbox-ico{font-size:36px;margin-bottom:6px}
.lbox-t{font-size:19px;font-weight:800;color:var(--txt);margin-bottom:3px}
.lbox-s{font-size:10px;color:var(--txt3);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:26px}
.lbox input{margin-bottom:10px}
.lbox .btn-p{width:100%;justify-content:center;padding:11px}
.atag{display:inline-flex;align-items:center;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:700}
.atag-b{background:rgba(33,150,243,.12);color:var(--pril);border:1px solid rgba(33,150,243,.2)}
.atag-y{background:rgba(255,179,0,.12);color:var(--acc);border:1px solid rgba(255,179,0,.2)}
.atag-g{background:rgba(76,175,80,.12);color:#66BB6A;border:1px solid rgba(76,175,80,.2)}
.atag-r{background:rgba(244,67,54,.12);color:#EF5350;border:1px solid rgba(244,67,54,.2)}
.atag-o{background:rgba(255,152,0,.12);color:#FFA726;border:1px solid rgba(255,152,0,.2)}
.orc-item{background:var(--card2);border:1px solid var(--b);border-radius:8px;padding:10px 12px;margin-bottom:8px}
.orc-item-top{display:grid;grid-template-columns:1fr 70px 90px 90px 80px 30px;gap:8px;align-items:center}
.orc-item-bot{margin-top:8px;padding-top:8px;border-top:1px solid var(--b)}
.tab-btns{display:flex;gap:4px;background:var(--card2);border:1px solid var(--b);border-radius:8px;padding:3px}
.tab-btn{padding:7px 16px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;border:none;background:none;color:var(--txt3);font-family:inherit;transition:all .15s}
.tab-btn.active{background:var(--card);color:var(--txt);box-shadow:0 1px 4px rgba(0,0,0,.3)}
.info-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:1px;background:var(--b);border:1px solid var(--b);border-radius:8px;overflow:hidden;margin-bottom:14px}
.info-cell{background:var(--card2);padding:10px 14px}
.info-lbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--txt3);margin-bottom:3px}
.info-val{font-size:13px;font-weight:700;color:var(--txt)}
.attr-block{background:var(--card2);border:1px solid var(--b);border-radius:8px;padding:14px;margin-bottom:12px}
.attr-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--pri);margin-bottom:10px;display:flex;align-items:center;gap:6px}
@media(max-width:900px){.g4{grid-template-columns:1fr 1fr}.g3{grid-template-columns:1fr 1fr}}

/* ─────────── MOBILE ─────────── */
@media(max-width:720px){
  /* Layout base */
  html,body{overflow-x:hidden;width:100%}
  .app{overflow-x:hidden}
  .sidebar{display:none!important}
  .menu-btn{display:none!important}
  .main{padding-bottom:calc(66px + env(safe-area-inset-bottom,0));width:100%;overflow-x:hidden}
  .content{padding:14px 12px;width:100%;overflow-x:hidden}

  /* Topbar */
  .topbar{padding:0 14px;height:50px}
  .pg-title{font-size:15px;font-weight:700}

  /* Grids → coluna única */
  .fr.c2,.fr.c3,.fr.c4{grid-template-columns:1fr}
  .g3,.g4{grid-template-columns:1fr 1fr}
  .g2{grid-template-columns:1fr 1fr}

  /* Tabelas → esconder, usar cards */
  .mob-tbl{display:none!important}
  .mob-card{display:block!important}

  /* Abas — maiores, mais visíveis */
  .tab-btns{
    overflow-x:auto;flex-wrap:nowrap;
    -webkit-overflow-scrolling:touch;scrollbar-width:none;
    background:var(--card2);border:1.5px solid var(--b2);border-radius:10px;
    padding:4px;gap:3px;
  }
  .tab-btns::-webkit-scrollbar{display:none}
  .tab-btn{
    flex-shrink:0;padding:9px 16px;border-radius:7px;
    font-size:13px;font-weight:600;color:var(--txt2);
    white-space:nowrap;
  }
  .tab-btn.active{
    background:var(--pri);color:#fff;
    box-shadow:0 2px 8px rgba(33,150,243,.4);
  }

  /* Inputs — font-size 16 evita zoom no iOS */
  input,select{padding:12px 13px;font-size:16px}
  textarea{font-size:15px;padding:11px 13px}
  label{font-size:12px;margin-bottom:5px}

  /* Botões */
  .btn{padding:11px 16px;font-size:14px}
  .btn-sm{padding:10px 15px;font-size:13px}
  .btn-xs{padding:6px 11px;font-size:12px}
  .btn-ico{padding:9px}

  /* Modal — sheet de baixo, fixo e sem overflow */
  .modal-bg{align-items:flex-end;backdrop-filter:none}
  .modal,.modal-w,.modal-xl{
    width:100vw!important;max-width:100vw!important;
    border-radius:18px 18px 0 0;max-height:92vh;
    margin:0;animation:su .22s ease;
    overflow-x:hidden!important;
  }
  .mhdr{border-radius:18px 18px 0 0;padding:14px 16px 12px;position:sticky;top:0}
  .mbody{padding:12px 14px;overflow-x:hidden}
  .mfoot{padding:10px 14px;gap:6px;flex-wrap:wrap}
  .mfoot .btn{flex:1;justify-content:center;min-width:0}
  /* Todo conteúdo dentro do modal cabe na largura */
  .mbody *{max-width:100%;box-sizing:border-box}
  .mbody input,.mbody select,.mbody textarea{width:100%}
  /* Remove min-width de elementos que causam overflow */
  .mbody .fr{gap:8px;margin-bottom:8px}
  .chips{gap:4px}
  .chip{padding:5px 9px;font-size:12px}
  /* Itens do orçamento no modal */
  .orc-item{padding:8px 10px}
  .orc-item-bot .chips{gap:3px}
  /* Seção novo cliente inline */
  #novoCliInline .fr.c2{grid-template-columns:1fr}
  /* Resumo total */
  #orcItensArea{overflow-x:hidden}

  /* Itens do orçamento — reordenar */
  .orc-item-top{display:flex!important;flex-wrap:wrap;gap:8px;align-items:flex-start}
  .orc-item-top>div:nth-child(1){order:1;flex:1 1 calc(100% - 50px);min-width:0}
  .orc-item-top>div:nth-child(6){order:2;flex:0 0 38px;align-self:flex-start;padding-top:18px}
  .orc-item-top>div:nth-child(2){order:3;flex:0 0 70px}
  .orc-item-top>div:nth-child(3){order:4;flex:0 0 64px}
  .orc-item-top>div:nth-child(4){order:5;flex:1 1 100px}
  .orc-item-top>div:nth-child(5){order:6;flex:1 1 90px}

  /* Toast — no topo em mobile */
  #toast{top:14px;bottom:auto;right:12px;left:12px}
  .ti{max-width:100%;font-size:14px}
}
@keyframes su{from{transform:translateY(30px);opacity:0}to{transform:translateY(0);opacity:1}}

/* ── Mobile bottom navigation ── */
.mob-nav{
  display:none;position:fixed;bottom:0;left:0;right:0;z-index:500;
  background:var(--sb);border-top:1.5px solid var(--b2);
  height:calc(60px + env(safe-area-inset-bottom,0));
  padding-bottom:env(safe-area-inset-bottom,0);
  align-items:stretch;
}
@media(max-width:720px){.mob-nav{display:flex}}
.mn-item{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:3px;color:var(--txt3);cursor:pointer;font-size:10px;font-weight:700;
  letter-spacing:.2px;border:none;background:none;
  padding:8px 2px 6px;height:100%;
  -webkit-tap-highlight-color:transparent;
  transition:color .15s,background .15s;
  border-top:2.5px solid transparent;
}
.mn-item.active{color:var(--pri);border-top-color:var(--pri);background:rgba(33,150,243,.07)}
.mn-item .mi{font-size:22px;line-height:1}

/* ── More menu (mobile) ── */
.mob-menu{display:none;position:fixed;inset:0;z-index:600;align-items:flex-end}
.mob-menu.open{display:flex}
.mob-menu-bg{position:absolute;inset:0;background:rgba(0,0,0,.6)}
.mob-menu-box{
  position:relative;width:100%;background:var(--sb);border-radius:18px 18px 0 0;
  padding:8px 12px calc(72px + env(safe-area-inset-bottom,0));
  border-top:1.5px solid var(--b2);z-index:1;
}
.mob-menu-handle{width:40px;height:4px;background:var(--b2);border-radius:2px;margin:8px auto 14px;display:block}
.mm-item{
  display:flex;align-items:center;gap:14px;padding:15px 12px;border-radius:10px;
  color:var(--txt2);font-size:15px;font-weight:500;cursor:pointer;
  border:none;background:none;width:100%;text-align:left;
  -webkit-tap-highlight-color:transparent;
}
.mm-item:active{background:var(--card2)}
.mm-item .ico{font-size:20px;width:26px;text-align:center;flex-shrink:0}

/* ── Mobile card list ── */
.mob-card{display:none}
.mc-item{
  background:var(--card);border:1px solid var(--b);border-radius:12px;
  padding:14px 15px;margin-bottom:10px;cursor:pointer;
  -webkit-tap-highlight-color:transparent;
  transition:border-color .12s,background .12s;
}
.mc-item:active{background:var(--card2);border-color:var(--b2)}
.mc-r1{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:6px}
.mc-r2{display:flex;align-items:center;justify-content:space-between;gap:8px}
.mc-id{font-weight:800;font-size:13px;color:var(--pri);flex-shrink:0}
.mc-idy{color:var(--acc)}
.mc-name{font-weight:600;color:var(--txt);font-size:15px;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mc-val{font-weight:800;color:var(--acc);font-size:15px;flex-shrink:0;margin-left:4px}
.mc-sub{font-size:12px;color:var(--txt3);flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mc-acts{display:flex;gap:5px;flex-shrink:0}

<script>
// ── Storage ──
const S={EMP:'at_emp',CLI:'at_cli',PRO:'at_pro',ORC:'at_orc',OS:'at_os',FIN:'at_fin',EST:'at_est',CFG:'at_cfg'}
const DB={
  get:k=>{try{return JSON.parse(localStorage.getItem(k)||'null')}catch{return null}},
  set:(k,v)=>{localStorage.setItem(k,JSON.stringify(v));_fsSync(k,v)}
}

// ── Firebase Sync ──
const _AT_FB={
  apiKey:'AIzaSyAFrWRE4zAhWGmCYu3zMKlv1pVJJ9F_QoQ',
  authDomain:'eletrica-91273.firebaseapp.com',
  projectId:'eletrica-91273',
  storageBucket:'eletrica-91273.firebasestorage.app',
  messagingSenderId:'995557704840',
  appId:'1:995557704840:web:dd44811c86ae5830478b3d'
}
const _FS_COL='at_sync'
const _FS_KEYS={[S.CLI]:'cli',[S.PRO]:'pro',[S.ORC]:'orc',[S.OS]:'os',[S.FIN]:'fin',[S.EST]:'est',[S.EMP]:'emp',[S.CFG]:'cfg'}
let _fdb=null,_syncEnabled=false

function _fsSync(key,data){
  if(!_fdb||!_syncEnabled)return
  const k=_FS_KEYS[key];if(!k)return
  _fdb.collection(_FS_COL).doc(k).set({data:JSON.stringify(data),ts:Date.now()}).catch(e=>console.warn('sync:',e))
}

async function _fsLoad(){
  if(!_fdb)return false
  const snap=await _fdb.collection(_FS_COL).get()
  let hasData=false
  snap.docs.forEach(doc=>{
    const d=doc.data()
    const lsKey=Object.entries(_FS_KEYS).find(([,v])=>v===doc.id)?.[0]
    if(lsKey&&d.data){localStorage.setItem(lsKey,d.data);hasData=true}
  })
  return hasData
}

function _fsListen(){
  if(!_fdb)return
  _fdb.collection(_FS_COL).onSnapshot(snap=>{
    if(!_syncEnabled)return
    snap.docs.forEach(doc=>{
      const d=doc.data()
      const lsKey=Object.entries(_FS_KEYS).find(([,v])=>v===doc.id)?.[0]
      if(!lsKey||!d.data)return
      if(d.data!==localStorage.getItem(lsKey)){localStorage.setItem(lsKey,d.data);_onRemoteUpdate(lsKey)}
    })
  },err=>console.warn('listener err:',err))
  document.addEventListener('visibilitychange',async()=>{
    if(document.visibilityState!=='visible'||!_syncEnabled||!_fdb)return
    try{
      const snap=await _fdb.collection(_FS_COL).get()
      let changed=false
      snap.docs.forEach(doc=>{
        const d=doc.data()
        const lsKey=Object.entries(_FS_KEYS).find(([,v])=>v===doc.id)?.[0]
        if(!lsKey||!d.data)return
        if(d.data!==localStorage.getItem(lsKey)){localStorage.setItem(lsKey,d.data);changed=true}
      })
      if(changed){updateBadges();nav(_page);toast('🔄 Dados atualizados','info',2000)}
    }catch(e){}
  })
}

function _onRemoteUpdate(key){
  _setSyncBadge('ok')
  updateBadges()
  const pageMap={[S.CLI]:'clientes',[S.PRO]:'produtos',[S.ORC]:'orcamentos',[S.OS]:'os',[S.FIN]:'financeiro',[S.EST]:'estoque',[S.EMP]:'config'}
  const p=pageMap[key]
  if(p&&_page===p){const renders={clientes:renderClientes,produtos:renderProdutos,orcamentos:renderOrcamentos,os:renderOS,financeiro:renderFinanceiro,estoque:renderEstoque,config:renderConfig};if(renders[p])renders[p]()}
  if(_page==='dashboard')renderDashboard()
  if(!document.getElementById('modalBg').classList.contains('open'))toast('🔄 Dados atualizados de outro dispositivo','info',2500)
}

function _setSyncBadge(state){
  const el=document.getElementById('syncBadge');if(!el)return
  if(state==='ok'){el.style.color='var(--suc)';el.title='Sincronizado'}
  else if(state==='sync'){el.style.color='var(--acc)';el.title='Sincronizando...'}
  else{el.style.color='var(--txt4)';el.title='Sem conexão — dados locais'}
}

async function _initFirebase(){
  try{
    if(!_fdb){
      if(!firebase.apps.length)firebase.initializeApp(_AT_FB)
      _fdb=firebase.firestore()
      _fdb.settings({experimentalForceLongPolling:true,merge:true})
    }
    _setSyncBadge('sync')
    _syncEnabled=true
    // Verifica se Firebase tem dados; se não, sobe os dados locais
    const hasRemoteData=await _fsLoad()
    if(!hasRemoteData){
      await Promise.all(Object.entries(_FS_KEYS).map(async([lsKey,fk])=>{
        const d=DB.get(lsKey);if(d===null)return
        await _fdb.collection(_FS_COL).doc(fk).set({data:JSON.stringify(d),ts:Date.now()}).catch(e=>console.warn('upload:',e))
      }))
    }
    _fsListen()
    _setSyncBadge('ok')
  }catch(e){console.warn('Firebase:',e);_setSyncBadge('offline')}
}

// ── Constants ──
const CATS=[
  {id:'inter_int',nome:'Interruptor Inteligente',ico:'🔘'},
  {id:'tomada',nome:'Tomada',ico:'🔌'},
  {id:'led_spot',nome:'Spot LED',ico:'💡'},
  {id:'led_amb',nome:'LED Ambiente',ico:'🌟'},
  {id:'led_fita',nome:'Fita LED',ico:'〰️'},
  {id:'cabo_fio',nome:'Cabo / Fio',ico:'🔗'},
  {id:'eletroduto',nome:'Eletroduto / Conduíte',ico:'⬡'},
  {id:'qd_eletrico',nome:'Quadro Elétrico',ico:'🗄️'},
  {id:'disjuntor',nome:'Disjuntor / DR / DPS',ico:'⚡'},
  {id:'automacao',nome:'Automação',ico:'📡'},
  {id:'servico',nome:'Serviço / Mão de Obra',ico:'🔧'},
  {id:'outro',nome:'Outros Materiais',ico:'📦'},
]
const LOCAIS=['Sala','Cozinha','Banheiro','Varanda','Quarto Casal','Quarto 1','Quarto 2','Suíte','Área de Serviço','Escritório','Garagem','Hall / Corredor','Fachada','Jardim','Sala de TV','Copa','Lavabo']
const ST_ORC={rascunho:{l:'Rascunho',c:'bdg-gr'},enviado:{l:'Enviado',c:'bdg-b'},aprovado:{l:'Aprovado',c:'bdg-g'},recusado:{l:'Recusado',c:'bdg-r'},executado:{l:'Executado',c:'bdg-y'}}
const ST_OS={aberta:{l:'Aberta',c:'bdg-b'},andamento:{l:'Em Andamento',c:'bdg-y'},concluida:{l:'Concluída',c:'bdg-g'},cancelada:{l:'Cancelada',c:'bdg-r'}}

// ── Utils ──
function genId(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7)}
function fmt(v,d=2){return new Intl.NumberFormat('pt-BR',{minimumFractionDigits:d,maximumFractionDigits:d}).format(v||0)}
function fmtR(v){return'R$ '+fmt(v)}
function fmtDate(d){if(!d)return'';const p=d.split('-');return p.length===3?p[2]+'/'+p[1]+'/'+p[0]:d}
function today(){return new Date().toISOString().slice(0,10)}
function addDays(d,n){const dt=new Date(d+'T12:00:00');dt.setDate(dt.getDate()+n);return dt.toISOString().slice(0,10)}
function nextNum(list,field='num'){return(list||[]).reduce((a,x)=>Math.max(a,parseInt(x[field]||0)),0)+1}
function catNome(id){return(CATS.find(c=>c.id===id)||{nome:id}).nome}
function catIco(id){return(CATS.find(c=>c.id===id)||{ico:'📦'}).ico}
function cliNome(id){const c=(DB.get(S.CLI)||[]).find(x=>x.id===id);return c?c.nome:'—'}
function orcNumFmt(n){return'ORC-'+String(n||0).padStart(4,'0')}
function osNumFmt(n){return'OS-'+String(n||0).padStart(4,'0')}
function getEmpresa(){return DB.get(S.EMP)||{nome:'AccertTech',fantasia:'AccertTech',fone:'',email:'',resp:'',crea:''}}

function toast(msg,type='ok',dur=3500){
  const el=document.createElement('div')
  el.className=`ti ti-${type==='ok'?'ok':type==='warn'?'w':'i'}`
  el.innerHTML=(type==='ok'?'✓':type==='warn'?'✕':'ℹ')+' '+msg
  document.getElementById('toast').appendChild(el)
  setTimeout(()=>el.classList.add('ti-show'),10)
  setTimeout(()=>{el.classList.remove('ti-show');setTimeout(()=>el.remove(),300)},dur)
}

function openModal(title,body,foot,wide){
  document.getElementById('modalTitle').textContent=title
  document.getElementById('modalBody').innerHTML=body
  document.getElementById('modalFoot').innerHTML=foot||''
  const m=document.getElementById('modal')
  m.className='modal'+(wide==='xl'?' modal-xl':wide?(' modal-w'):'')
  document.getElementById('modalBg').classList.add('open')
  // Trava scroll do fundo para não dançar em mobile
  const main=document.querySelector('.main')
  if(main)main.style.overflow='hidden'
  document.body.style.overflow='hidden'
}
function closeModal(){
  document.getElementById('modalBg').classList.remove('open')
  const main=document.querySelector('.main')
  if(main)main.style.overflow=''
  document.body.style.overflow=''
}

function confirmarModal(msg,fn,btnLbl='Confirmar',btnCls='btn-d'){
  document.getElementById('cfmBody').innerHTML=msg
  const btn=document.getElementById('cfmOk')
  btn.className='btn '+btnCls+' btn-sm'
  btn.textContent=btnLbl
  btn.onclick=()=>{document.getElementById('cfmBg').classList.remove('open');fn()}
  document.getElementById('cfmBg').classList.add('open')
}

function toggleSidebar(){
  const sb=document.getElementById('sidebar')
  const ov=document.getElementById('sideOverlay')
  const open=sb.classList.toggle('mob-open')
  ov.style.display=open?'block':'none'
}
function openMobMenu(){document.getElementById('mobMenu').classList.add('open')}
function closeMobMenu(){document.getElementById('mobMenu').classList.remove('open')}

// ── Auth / Sessão ──
function _getUsers(){
  const cfg=DB.get(S.CFG)||{}
  // compatibilidade com formato antigo (só um user)
  if(cfg.users)return cfg.users
  return [{user:cfg.user||'admin',pass:cfg.pass||'1234',role:'admin',nome:'Admin'}]
}
function currentUser(){try{return JSON.parse(sessionStorage.getItem('at_session')||'{}')}catch{return{}}}
function isAdmin(){return currentUser().role==='admin'}

async function doLogin(){
  const u=document.getElementById('loginUser').value.trim()
  const p=document.getElementById('loginPass').value
  const btn=document.querySelector('#loginOv .btn-p')
  if(btn){btn.disabled=true;btn.textContent='Verificando...'}
  // Tenta local primeiro (rápido)
  let found=_getUsers().find(x=>x.user===u&&x.pass===p)
  // Se não achou, aguarda o Firebase (já iniciado no DOMContentLoaded)
  if(!found){
    try{
      if(btn)btn.textContent='Sincronizando...'
      await (_cfgReady||_preLoadCfg())
      found=_getUsers().find(x=>x.user===u&&x.pass===p)
    }catch(e){console.warn('preload cfg:',e)}
  }
  if(btn){btn.disabled=false;btn.textContent='⚡ Entrar'}
  if(found){
    sessionStorage.setItem('at_ok','1')
    sessionStorage.setItem('at_session',JSON.stringify(found))
    document.getElementById('loginOv').style.display='none'
    document.getElementById('app').style.display='flex'
    initApp()
  }else{
    toast('Usuário ou senha incorretos','warn',4000)
    document.getElementById('loginPass').value=''
  }
}

async function _preLoadCfg(){
  if(!_fdb){
    try{
      if(!firebase.apps.length)firebase.initializeApp(_AT_FB)
      _fdb=firebase.firestore()
      _fdb.settings({experimentalForceLongPolling:true,merge:true})
    }catch(e){console.warn('fb init:',e);return}
  }
  try{
    const doc=await _fdb.collection(_FS_COL).doc('cfg').get()
    if(doc.exists&&doc.data().data){
      localStorage.setItem(S.CFG,doc.data().data)
    }
  }catch(e){console.warn('preLoadCfg:',e)}
}
// ── Assinatura digital ──
function _waLink(wa){
  if(!wa)return''
  const n=wa.replace(/\D/g,'')
  if(!n)return''
  const full=n.startsWith('55')&&n.length>=12?n:'55'+n
  return'https://wa.me/'+full
}

async function _initFbPublic(){
  if(_fdb)return
  if(!firebase.apps.length)firebase.initializeApp(_AT_FB)
  _fdb=firebase.firestore()
  _fdb.settings({experimentalForceLongPolling:true,merge:true})
}

async function _loadSigPage(token){
  const el=document.getElementById('sigContent')
  el.innerHTML='<div style="text-align:center;padding:80px 20px;color:#6B7A94;font-size:14px">⏳ Carregando...</div>'
  try{
    await _initFbPublic()
    const snap=await _fdb.collection('sigs').doc(token).get()
    if(!snap.exists){
      el.innerHTML=`<div style="text-align:center;padding:80px 20px">
        <div style="font-size:48px;margin-bottom:16px">⚠️</div>
        <div style="font-size:18px;font-weight:700;color:#E8EDF5;margin-bottom:8px">Link inválido</div>
        <div style="font-size:13px;color:#6B7A94">Este link não existe ou foi removido.</div></div>`
      return
    }
    const sigRaw=snap.data()
    // Fetch current product catalog from Firestore to merge fresh attrs (cor, botoes, etc.)
    let _prods=[]
    try{const pd=await _fdb.collection('at_sync').doc('pro').get();if(pd.exists)_prods=JSON.parse(pd.data().data||'[]')}catch(e){console.warn('prod load:',e)}
    const _mergeItemAttrs=itens=>(itens||[]).map(it=>{
      const p=it.prodId&&it.prodId!=='_custom'?_prods.find(x=>x.id===it.prodId):null
      if(!p)return{...it}
      return{...it,...p,prodId:it.prodId,nome:p.nome,qtd:it.qtd,un:it.un,pu:it.pu,sub:it.sub,locais:it.locais,obs:it.obs,cat:it.cat}
    })
    const sig=sigRaw.orc?{...sigRaw,orc:{...sigRaw.orc,itens:_mergeItemAttrs(sigRaw.orc?.itens)}}:sigRaw
    const sigProdIds=(sig.orc?.itens||[]).map(it=>it.prodId).filter(id=>id&&id!=='_custom')
    if(sigProdIds.length)await _loadProdImgs(sigProdIds)
    el.innerHTML=sig.signed?_sigJaAssinou(sig):_sigForm(sig,token)
    if(!sig.signed)_sigInitCanvas()
  }catch(e){
    el.innerHTML=`<div style="text-align:center;padding:60px 20px;color:#EF5350">Erro ao carregar: ${e.message}</div>`
  }
}

let _pubSig=null

function _sigJaAssinou(sig){
  _pubSig=sig
  const e=sig.empresa||{}
  const wa=sig.empresa?.wa||sig.empresa?.fone||''
  const dt=sig.signedAt?new Date(sig.signedAt).toLocaleString('pt-BR'):''
  const waMsg=wa?_waLink(wa)+'?text='+encodeURIComponent('Olá! Tenho dúvidas sobre meu orçamento.'):''
  return`
  <div style="text-align:center;padding:20px 0 28px">
    <div style="font-size:11px;font-weight:700;color:#2196F3;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:20px">⚡ ${e.fantasia||e.nome||'AccertTech'}</div>
    <div style="font-size:52px;margin-bottom:14px">✅</div>
    <div style="font-size:20px;font-weight:800;color:#4CAF50;margin-bottom:8px">Orçamento aprovado!</div>
    <div style="font-size:14px;color:#B0BCCF;margin-bottom:4px">
      ${sig.signedNome?`Assinado por <strong style="color:#E8EDF5">${sig.signedNome}</strong>`:'Orçamento aprovado com assinatura digital'}
    </div>

let _sigDrawn=false

function _sigInitCanvas(){
  const c=document.getElementById('sigCanvas')
  if(!c)return
  _sigDrawn=false
  const ctx=c.getContext('2d')
  ctx.strokeStyle='#4CAF50'
  ctx.lineWidth=3
  ctx.lineCap='round'
  ctx.lineJoin='round'
  let drawing=false,lx=0,ly=0
  function _pt(e){
    const r=c.getBoundingClientRect()
    const sx=c.width/r.width,sy=c.height/r.height
    const src=e.touches?e.touches[0]:e
    return{x:(src.clientX-r.left)*sx,y:(src.clientY-r.top)*sy}
  }
  function _start(e){e.preventDefault();drawing=true;const p=_pt(e);lx=p.x;ly=p.y;ctx.beginPath();ctx.arc(p.x,p.y,1.5,0,Math.PI*2);ctx.fillStyle='#4CAF50';ctx.fill();_sigDrawn=true;c.style.borderColor='#4CAF50'}
  function _move(e){if(!drawing)return;e.preventDefault();const p=_pt(e);ctx.beginPath();ctx.moveTo(lx,ly);ctx.lineTo(p.x,p.y);ctx.stroke();lx=p.x;ly=p.y}
  function _end(){drawing=false}
  c.addEventListener('mousedown',_start)
  c.addEventListener('mousemove',_move)
  c.addEventListener('mouseup',_end)
  c.addEventListener('mouseleave',_end)
  c.addEventListener('touchstart',_start,{passive:false})
  c.addEventListener('touchmove',_move,{passive:false})
  c.addEventListener('touchend',_end)
}

function _sigClearCanvas(){
  const c=document.getElementById('sigCanvas')
  if(!c)return
  c.getContext('2d').clearRect(0,0,c.width,c.height)
  c.style.borderColor='#2E3850'
  _sigDrawn=false
}

  if(!ua)return'Dispositivo desconhecido'
  let browser='Navegador'
  if(/Edg\/(\d+)/.test(ua))browser='Edge '+ua.match(/Edg\/(\d+)/)[1]
  else if(/OPR\/(\d+)/.test(ua))browser='Opera '+ua.match(/OPR\/(\d+)/)[1]
  else if(/Chrome\/(\d+)/.test(ua))browser='Chrome '+ua.match(/Chrome\/(\d+)/)[1]
  else if(/Firefox\/(\d+)/.test(ua))browser='Firefox '+ua.match(/Firefox\/(\d+)/)[1]
  else if(/Safari\//.test(ua))browser='Safari'
  let os='SO desconhecido'
  if(/iPhone/.test(ua))os='iPhone'
  else if(/iPad/.test(ua))os='iPad'
  else if(/Android/.test(ua))os='Android'+((/Android ([\d.]+)/.test(ua))?' '+ua.match(/Android ([\d.]+)/)[1]:'')
  else if(/Windows NT 10/.test(ua))os='Windows 10/11'
  else if(/Windows NT/.test(ua))os='Windows'
  else if(/Mac OS X/.test(ua))os='macOS'
  else if(/Linux/.test(ua))os='Linux'
  return browser+' · '+os
}

async function _assinarOrcamento(token){
  if(!_sigDrawn){
    const c=document.getElementById('sigCanvas')
    if(c)c.style.borderColor='#F44336'
    return alert('Por favor, assine no campo acima antes de confirmar.')
  }
  const c=document.getElementById('sigCanvas')
  const imgData=c?c.toDataURL('image/png'):null
  const btn=document.querySelector('#sigContent button[onclick*="_assinarOrcamento"]')
  if(btn){btn.disabled=true;btn.textContent='Coletando informações...'}
  let signedIp='—'
  try{const r=await fetch('https://api.ipify.org?format=json');const j=await r.json();signedIp=j.ip||'—'}catch{}
  const signedDevice=_parseUA(navigator.userAgent)
  const signedUA=navigator.userAgent||''
  if(btn)btn.textContent='Assinando...'
  try{
    await _fdb.collection('sigs').doc(token).update({signed:true,signedAt:Date.now(),signedImg:imgData,signedNome:null,signedIp,signedDevice,signedUA})
    const snap=await _fdb.collection('sigs').doc(token).get()
    const sigData=snap.data()
    // Atualiza status do orçamento para "aprovado" no banco central
    if(sigData.orcId){
      try{
        const orcDoc=await _fdb.collection('at_sync').doc('orc').get()
        if(orcDoc.exists){
          const orcs=JSON.parse(orcDoc.data().data||'[]')
          const idx=orcs.findIndex(x=>x.id===sigData.orcId)
          if(idx>=0&&orcs[idx].status!=='aprovado'){
            orcs[idx].status='aprovado'
            await _fdb.collection('at_sync').doc('orc').set({data:JSON.stringify(orcs),ts:Date.now()})
          }
        }
      }catch(err){console.warn('status update:',err)}
    }
    document.getElementById('sigContent').innerHTML=_sigJaAssinou(sigData)
  }catch(e){
    if(btn){btn.disabled=false;btn.textContent='✅ Confirmar e Assinar'}
    alert('Erro ao assinar: '+e.message)
  }
}

async function gerarLinkAssinatura(orcId){
  const list=DB.get(S.ORC)||[]
  const o=list.find(x=>x.id===orcId)
  if(!o)return toast('Orçamento não encontrado','warn')
  const emp=getEmpresa()
  const cli=(DB.get(S.CLI)||[]).find(x=>x.id===o.cliId)||{}
  openModal('🔗 Link de Assinatura',
    `<div id="sigModalContent" style="text-align:center;padding:24px 0;color:var(--txt3)">⏳ Gerando link...</div>`,
    `<button class="btn btn-o btn-sm" onclick="closeModal()">Fechar</button>`)
  try{
    if(!_fdb){
      if(!firebase.apps.length)firebase.initializeApp(_AT_FB)
      _fdb=firebase.firestore()
      _fdb.settings({experimentalForceLongPolling:true,merge:true})
    }
    const _nomesAtuais=itens=>(itens||[]).map(it=>{
      const pAtual=it.prodId&&it.prodId!=='_custom'?(DB.get(S.PRO)||[]).find(p=>p.id===it.prodId):null
      if(!pAtual)return{...it}
      return{...it,...pAtual,prodId:it.prodId,nome:pAtual.nome,qtd:it.qtd,un:it.un,pu:it.pu,sub:it.sub,locais:it.locais,obs:it.obs,cat:it.cat}
    })
    let token=o.sigToken
    if(token){
      const snap=await _fdb.collection('sigs').doc(token).get()
      if(snap.exists){
        const sigAtual=snap.data()
        const itensAtualizados=_nomesAtuais(sigAtual.orc?.itens)
        const orcAtualizado={...sigAtual.orc,itens:itensAtualizados,
          totalF:o.totalF||0,sub:o.sub||0,desc:o.desc||0,pgto:o.pgto||'',obs:o.obs||'',endObra:o.endObra||'',dataInicio:o.dataInicio||'',dataFim:o.dataFim||''}
        const sigAtualizado={...sigAtual,orc:orcAtualizado,
          empresa:{nome:emp.nome,fantasia:emp.fantasia,fone:emp.fone,wa:emp.wa||''},
          cli:{nome:cli.nome||'',fone:cli.fone||''}}
        if(!sigAtual.signed)await _fdb.collection('sigs').doc(token).update({orc:orcAtualizado,empresa:sigAtualizado.empresa,cli:sigAtualizado.cli})
        // Se já está assinado, atualiza status local para "aprovado"
        if(sigAtual.signed){
          const llist=DB.get(S.ORC)||[]
          const lidx=llist.findIndex(x=>x.id===orcId)
          if(lidx>=0&&llist[lidx].status!=='aprovado'){llist[lidx].status='aprovado';DB.set(S.ORC,llist);renderOrcamentos()}
        }
        _showSigModal(token,sigAtualizado);return
      }
    }
    // Gera token de 8 chars base-36
    token=(Math.random().toString(36).slice(2,6)+Math.random().toString(36).slice(2,6)).slice(0,8)
    const sigData={
      orcId,
      empresa:{nome:emp.nome,fantasia:emp.fantasia,fone:emp.fone,wa:emp.wa||''},
      orc:{num:o.num,data:o.data,validade:o.validade,endObra:o.endObra||'',dataInicio:o.dataInicio||'',dataFim:o.dataFim||'',pgto:o.pgto||'',obs:o.obs||'',totalF:o.totalF||0,sub:o.sub||0,desc:o.desc||0,
        itens:_nomesAtuais(o.itens)},
      cli:{nome:cli.nome||'',fone:cli.fone||''},
      signed:false,signedAt:null,signedNome:null,createdAt:Date.now()
    }
    await _fdb.collection('sigs').doc(token).set(sigData)
    // Salva token no orçamento
    const idx=list.findIndex(x=>x.id===orcId)
    if(idx>=0){list[idx].sigToken=token;DB.set(S.ORC,list)}
    _showSigModal(token,sigData)
  }catch(e){
    document.getElementById('sigModalContent').innerHTML=`<div style="color:var(--dan);text-align:center">Erro: ${e.message}</div>`
  }
}

const _imgCache={}
let _prodImgData=null

function _resizeImg(file,maxW=400,maxH=400,q=0.72){
  return new Promise((res,rej)=>{
    const r=new FileReader()
    r.onload=e=>{
      const img=new Image()
      img.onload=()=>{
        const sc=Math.min(maxW/img.width,maxH/img.height,1)
        const c=document.createElement('canvas')
        c.width=Math.round(img.width*sc);c.height=Math.round(img.height*sc)
        c.getContext('2d').drawImage(img,0,0,c.width,c.height)
        res(c.toDataURL('image/jpeg',q))
      }
      img.onerror=rej;img.src=e.target.result
    }
    r.onerror=rej;r.readAsDataURL(file)
  })
}

async function _loadProdImgs(prodIds){
  if(!prodIds?.length||!_fdb)return
  const toLoad=[...new Set(prodIds)].filter(id=>id&&id!=='_custom'&&!(id in _imgCache))
  if(!toLoad.length)return
  await Promise.all(toLoad.map(async id=>{
    try{const doc=await _fdb.collection('prod_imgs').doc(id).get();_imgCache[id]=doc.exists?doc.data().img||null:null}
    catch{_imgCache[id]=null}
  }))
}

function _previewProdImg(input){
  const file=input.files[0];if(!file)return
  _resizeImg(file).then(data=>{
    _prodImgData=data
    const el=document.getElementById('pImgPreview')
    if(el)el.innerHTML=`<img src="${data}" style="width:100%;height:100%;object-fit:cover;border-radius:6px">`
  }).catch(()=>toast('Erro ao processar imagem','warn'))
}

function salvarProduto(id){
  const nome=v('pNome').trim()
  if(!nome)return toast('Informe o nome do produto','warn')
  const cat=v('pCat')
  const pu=parseFloat(v('pPu'))||0
  const list=DB.get(S.PRO)||[]
  const gc=f=>document.getElementById('pa_'+f)
  const gcv=f=>{const el=gc(f);return el?(el.type==='checkbox'?el.checked:el.value)||'':''}
  const data={id:id||genId(),cat,nome,pu,un:v('pUn'),desc:v('pDesc'),cod:v('pCod')}
  // Category-specific attributes
  const attrs=['cor','botoes','tipo','voltagem','temTomada','wifi','corrente','tipoTomada','protInf',
    'potencia','tempCor','recorte','tensao','marca','tipoLed','ip','bitola','tipoCabo','material',
    'diametro','tipoEl','polos','tipoQD','embutir','tipoDisj','polo','sensibilidade',
    'tipoAuto','protocolo','compatibilidade','tipoServico','unServico']
  attrs.forEach(a=>{const el=document.getElementById('pa_'+a);if(el){const val=el.type==='checkbox'?el.checked:el.value;if(val!==''&&val!==false)data[a]=val}})
  if(_prodImgData)data.img=true
  if(_removerImg&&!_prodImgData)data.img=false
  if(id){const i=list.findIndex(x=>x.id===id);if(i>=0)list[i]=data;else list.push(data)}else list.push(data)
  DB.set(S.PRO,list);closeModal();toast('Produto salvo');renderProdutos()
  // Salvar/remover imagem no Firestore assincronamente
  const finalId=data.id
  if(_prodImgData&&_fdb){
    _fdb.collection('prod_imgs').doc(finalId).set({img:_prodImgData}).then(()=>{_imgCache[finalId]=_prodImgData}).catch(e=>console.warn('img save:',e))
  }else if(_removerImg&&_fdb){
    _fdb.collection('prod_imgs').doc(finalId).delete().then(()=>{_imgCache[finalId]=null}).catch(()=>{})
  }
  _prodImgData=null;_removerImg=false
}

    DB.set(S.PRO,(DB.get(S.PRO)||[]).filter(x=>x.id!==id));toast('Produto excluído');renderProdutos()
  })
}

  <div class="orc-item" id="orcItem${i}">
    <div class="orc-item-top">
      <div><label>Produto / Serviço</label>
        <select onchange="orcSetProd(${i},this.value)" style="font-size:12px">
          <option value="_custom">✏️ Personalizado</option>
          ${prods.map(p=>`<option value="${p.id}" ${it.prodId===p.id?'selected':''}>${catIco(p.cat)} ${p.nome}${_prodLabel(p)}</option>`).join('')}
        </select>
        ${it.prodId==='_custom'?`<input id="orcItemNome${i}" placeholder="Nome do item" value="${it.nome||''}" style="margin-top:5px;font-size:12px" oninput="_orcItens[${i}].nome=this.value">`:

      </div>
      <div><label>Qtd.</label><input type="number" step="0.01" min="0.01" value="${it.qtd||1}" oninput="_orcItens[${i}].qtd=parseFloat(this.value)||1;recalcOrc()" style="text-align:center"></div>
      <div><label>Un.</label><select onchange="_orcItens[${i}].un=this.value" style="font-size:12px">
        ${['un','m','pto','hr','vb','kg','cx','rolo','m²'].map(u=>`<option ${(it.un||'un')===u?'selected':''}>${u}</option>`).join('')}
      </select></div>
      <div><label>Preço Unit.</label><input type="number" step="0.01" min="0" value="${it.pu||0}" oninput="_orcItens[${i}].pu=parseFloat(this.value)||0;recalcOrc()" style="text-align:right"></div>
      <div><label>Subtotal</label><div style="padding:9px 11px;font-weight:700;color:var(--acc);font-size:13px" id="orcSub${i}">${fmtR((it.qtd||1)*(it.pu||0))}</div></div>
      <div style="display:flex;align-items:flex-end;padding-bottom:2px"><button class="btn btn-g btn-ico" onclick="orcRemItem(${i})">🗑️</button></div>
    </div>
    <div class="orc-item-bot">
      <label style="margin-bottom:6px">📍 Local de Execução</label>
      <div class="chips">${LOCAIS.map(l=>`<span class="chip${(it.locais||[]).includes(l)?' sel':''}" onclick="orcToggleLocal(${i},'${l}')">${l}</span>`).join('')}</div>
      <input placeholder="Observação deste item (opcional)" value="${it.obs||''}" oninput="_orcItens[${i}].obs=this.value" style="margin-top:8px;font-size:12px">
    </div>
  </div>`).join('')
}

function orcAddItem(){
  _orcItens.push({prodId:'_custom',nome:'',qtd:1,un:'un',pu:0,sub:0,locais:[],obs:''})
  document.getElementById('orcItensArea').innerHTML=renderOrcItens()
  recalcOrc()
}

function orcRemItem(i){_orcItens.splice(i,1);document.getElementById('orcItensArea').innerHTML=renderOrcItens();recalcOrc()}

function orcSetProd(i,prodId){
  if(prodId==='_custom'){_orcItens[i]={..._orcItens[i],prodId:'_custom',nome:'',pu:0}}
  else{
    const p=(DB.get(S.PRO)||[]).find(x=>x.id===prodId)
    if(p){
      const {id:_,...attrs}=p
      _orcItens[i]={..._orcItens[i],...attrs,prodId}
    }
  }
  document.getElementById('orcItensArea').innerHTML=renderOrcItens()
  recalcOrc()
}

function orcToggleLocal(i,local){
  const loc=_orcItens[i].locais||[]
  const idx=loc.indexOf(local)
  if(idx>=0)loc.splice(idx,1);else loc.push(local)
  _orcItens[i].locais=loc
  // Update chips without full re-render
  const area=document.getElementById('orcItem'+i)
  if(area){const chips=area.querySelectorAll('.chip');chips.forEach(c=>{const sel=loc.includes(c.textContent.trim());c.classList.toggle('sel',sel)})}
}

function recalcOrc(){
  let sub=0
  _orcItens.forEach((it,i)=>{
    const s=(it.qtd||1)*(it.pu||0)
    it.sub=s;sub+=s
    const el=document.getElementById('orcSub'+i)
    if(el)el.textContent=fmtR(s)
  })
  const desc=parseFloat(document.getElementById('oDesc')?.value)||0
  const total=Math.max(0,sub-desc)
  const st=document.getElementById('oSubtotal')
  const sd=document.getElementById('oDescDisp')
  const tt=document.getElementById('oTotalDisp')
  if(st)st.textContent=fmtR(sub)
  if(sd)sd.textContent=fmtR(desc)
  if(tt)tt.textContent=fmtR(total)
}

function _buildOrcData(id){
  recalcOrc()
  const cliId=v('oCli')
  if(!cliId){toast('Selecione um cliente','warn');return null}
  if(!_orcItens.length){toast('Adicione pelo menos um item','warn');return null}
  _orcItens.forEach((it,i)=>{if(it.prodId==='_custom'){const el=document.getElementById('orcItemNome'+i);if(el)it.nome=el.value}})
  const desc=parseFloat(v('oDesc'))||0
  const sub=_orcItens.reduce((a,it)=>a+(it.sub||0),0)
  const totalF=Math.max(0,sub-desc)
  const list=DB.get(S.ORC)||[]
  const valDias=parseInt(v('oVal'))||30
  return{
    data:{
      id:id||genId(),num:id?list.find(x=>x.id===id)?.num||nextNum(list):Math.max(nextNum(list),192308),
      cliId,data:v('oData'),valDias,validade:addDays(v('oData'),valDias),
      endObra:v('oEnd'),resp:v('oResp'),dataInicio:v('oDataInicio'),dataFim:v('oDataFim'),desc,pgto:v('oPgto'),
      status:v('oStatus'),obs:v('oObs'),
      itens:JSON.parse(JSON.stringify(_orcItens)),sub,totalF,
      criadoPor:id?(list.find(x=>x.id===id)?.criadoPor||currentUser().user):currentUser().user
    },
    list
  }
}

function salvarOrcamento(id){
  const r=_buildOrcData(id);if(!r)return
  const{data,list}=r
  if(id){const i=list.findIndex(x=>x.id===id);if(i>=0)list[i]=data;else list.push(data)}else list.push(data)
  DB.set(S.ORC,list);closeModal();toast('Orçamento salvo');renderOrcamentos()
}

function salvarEImprimirOrcamento(id){
  const r=_buildOrcData(id);if(!r)return
  const{data,list}=r
  if(id){const i=list.findIndex(x=>x.id===id);if(i>=0)list[i]=data;else list.push(data)}else list.push(data)
  DB.set(S.ORC,list)
  toast('Salvo','ok',1500)
  setTimeout(()=>imprimirOrcamento(id||data.id),150)
}

function excluirOrcamento(id){
  confirmarModal('Excluir este orçamento permanentemente?',()=>{
    DB.set(S.ORC,(DB.get(S.ORC)||[]).filter(x=>x.id!==id));toast('Orçamento excluído');renderOrcamentos()

function salvarClienteRapido(){
  const nome=(document.getElementById('ncNome')?.value||'').trim()
  if(!nome)return toast('Informe o nome do cliente','warn')
  const list=DB.get(S.CLI)||[]
  const newCli={id:genId(),nome,fone:document.getElementById('ncFone')?.value||'',
    email:document.getElementById('ncEmail')?.value||'',end:document.getElementById('ncEnd')?.value||'',obs:''}
  list.push(newCli)

  </div>

function salvarUsuario(editUser){
  const userLogin=editUser||v('uUser').trim()
  const nome=v('uNome').trim()
  const pass=v('uPass')
  const role=v('uRole')
  if(!userLogin)return toast('Informe o login do usuário','warn')
  if(!nome)return toast('Informe o nome','warn')
  if(!editUser&&!pass)return toast('Informe a senha','warn')
  const cfg=DB.get(S.CFG)||{}
  const users=_getUsers()
  const idx=users.findIndex(x=>x.user===userLogin)
  const data={user:userLogin,nome,role,modules:role==='admin'?[]:['orcamentos']}
  if(idx>=0){data.pass=pass||users[idx].pass;users[idx]=data}
  else{if(users.find(x=>x.user===userLogin))return toast('Usuário já existe','warn');data.pass=pass;users.push(data)}
  cfg.users=users
  DB.set(S.CFG,cfg)
  closeModal();toast('Usuário salvo');renderConfig()
}

}

async function imprimirDocAssinado(token){
  try{
    if(!_fdb){
      if(!firebase.apps.length)firebase.initializeApp(_AT_FB)
      _fdb=firebase.firestore()
      _fdb.settings({experimentalForceLongPolling:true,merge:true})
    }
    const snap=await _fdb.collection('sigs').doc(token).get()
    if(!snap.exists)return toast('Assinatura não encontrada','warn')
    const sig=snap.data()
    imprimirOrcamento(sig.orcId,sig)
  }catch(e){toast('Erro ao carregar assinatura: '+e.message,'warn')}
}

async function imprimirOrcamento(id,sigData=null){
  const o=(DB.get(S.ORC)||[]).find(x=>x.id===id);if(!o)return
  if(!sigData&&o.sigToken){
    try{
      if(!_fdb){if(!firebase.apps.length)firebase.initializeApp(_AT_FB);_fdb=firebase.firestore();_fdb.settings({experimentalForceLongPolling:true,merge:true})}
      const snap=await _fdb.collection('sigs').doc(o.sigToken).get()
      if(snap.exists&&snap.data().signed)sigData=snap.data()
    }catch(e){console.warn('sig fetch:',e)}
  }
  const cli=(DB.get(S.CLI)||[]).find(x=>x.id===o.cliId)||{}
  const prods=DB.get(S.PRO)||[]
  const e=getEmpresa()
  const infoCells=[]
  if(o.data)infoCells.push({l:'Data',v:fmtDate(o.data)})
  if(o.validade)infoCells.push({l:'Válido até',v:fmtDate(o.validade)})
  if(o.dataInicio)infoCells.push({l:'Início do Serviço',v:fmtDate(o.dataInicio)})
  if(o.dataFim)infoCells.push({l:'Término do Serviço',v:fmtDate(o.dataFim)})
  if(cli.nome)infoCells.push({l:'Cliente',v:cli.nome})
  if(cli.fone)infoCells.push({l:'Telefone',v:cli.fone})
  if(o.endObra)infoCells.push({l:'Endereço da Obra',v:o.endObra,full:true})
  if(o.resp)infoCells.push({l:'Responsável Técnico',v:o.resp})
  if(o.pgto)infoCells.push({l:'Pagamento',v:o.pgto})

  const prodIdsComImg=(o.itens||[]).filter(it=>it.prodId&&it.prodId!=='_custom').map(it=>it.prodId)
  await _loadProdImgs(prodIdsComImg)

  const cats=[...new Set(o.itens.map(it=>it.cat||'outro'))]
  let rowsHtml='',numGlobal=0
  // Group by category
  cats.forEach(cat=>{
    const items=o.itens.filter(it=>(it.cat||'outro')===cat)
    rowsHtml+=`<tr><td colspan="7" style="background:#EEF4FF;color:#1565C0;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;padding:6px 10px">${catIco(cat)} ${catNome(cat)}</td></tr>`
    items.forEach(it=>{
      numGlobal++
      const prodAtual=it.prodId&&it.prodId!=='_custom'?prods.find(p=>p.id===it.prodId):null
      const nomeImpresso=prodAtual?prodAtual.nome:it.nome
      const imgSrc=it.prodId&&it.prodId!=='_custom'?_imgCache[it.prodId]:null

function getAttrTagsForPrint(p){
  const tags=[]
  if(p.cor)tags.push(`<span class="atag">Cor: ${p.cor}</span>`)
  if(p.botoes)tags.push(`<span class="atag">${p.botoes} bot${parseInt(p.botoes)>1?'ões':'ão'}</span>`)
  if(p.temTomada)tags.push(`<span class="atag">c/ tomada</span>`)
  if(p.wifi)tags.push(`<span class="atag">Wi-Fi</span>`)
  if(p.bitola)tags.push(`<span class="atag">Bitola: ${p.bitola}mm²</span>`)
  if(p.tipoCabo)tags.push(`<span class="atag">${p.tipoCabo}</span>`)
  if(p.material)tags.push(`<span class="atag">${p.material}</span>`)
  if(p.potencia)tags.push(`<span class="atag">${p.potencia}</span>`)
  if(p.tempCor)tags.push(`<span class="atag">${p.tempCor}</span>`)
  if(p.corrente)tags.push(`<span class="atag">${p.corrente}</span>`)
  if(p.polo)tags.push(`<span class="atag">${p.polo}</span>`)
  if(p.voltagem)tags.push(`<span class="atag">${p.voltagem}</span>`)
  if(p.diametro)tags.push(`<span class="atag">Ø${p.diametro}mm</span>`)
  if(p.polos)tags.push(`<span class="atag">${p.polos} polos</span>`)
  if(p.tipoServico)tags.push(`<span class="atag">${p.tipoServico}</span>`)
  return tags.join('')
}

function v(id){const el=document.getElementById(id);return el?el.value:''}

// ── Chat ──
let _chatUnsub=null,_chatMsgs=[],_chatUnread=0

function _escHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

function renderChat(){
  const myUser=currentUser().user
  const admin=isAdmin()
  let html='',lastDay=''
  _chatMsgs.forEach(m=>{
    const d=new Date(m.ts)
    const day=d.toLocaleDateString('pt-BR',{weekday:'long',day:'2-digit',month:'long'})
    if(day!==lastDay){html+=`<div class="chat-day-sep">${day}</div>`;lastDay=day}
    const isMe=m.from===myUser
    const canDel=isMe||admin
    const time=d.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})
    const delBtn=canDel?`<button onclick="apagarMsgChat('${m.id}')" title="Apagar" style="background:none;border:none;cursor:pointer;color:var(--txt4);font-size:16px;padding:6px 8px;opacity:.7;flex-shrink:0;align-self:center;-webkit-tap-highlight-color:transparent">🗑️</button>`:''
    html+=`<div style="display:flex;align-items:flex-end;gap:4px;justify-content:${isMe?'flex-end':'flex-start'}">
      ${!isMe?delBtn:''}
      <div class="chat-row ${isMe?'chat-row-me':'chat-row-them'}">
        ${!isMe?`<div class="chat-sender">${_escHtml(m.fromNome||m.from)}</div>`:''}
        <div class="chat-bubble ${isMe?'chat-mine':'chat-theirs'}">${_escHtml(m.text)}</div>
        <div class="chat-time">${time}</div>
      </div>
      ${isMe?delBtn:''}
    </div>`
  })
  document.getElementById('content').innerHTML=`
  <div class="chat-wrap">
    <div class="chat-msgs" id="chatMsgs">${html||'<div class="chat-empty">Nenhuma mensagem ainda.<br>Diga olá! 👋</div>'}</div>
    <div class="chat-bar">
      <input id="chatInput" placeholder="Digite uma mensagem..." maxlength="1000" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendChatMsg()}">
      <button class="btn btn-p" onclick="sendChatMsg()" style="flex-shrink:0">Enviar</button>
    </div>
  </div>`
  _requestNotifPerm()
  _markChatRead()
  setTimeout(()=>{const el=document.getElementById('chatMsgs');if(el)el.scrollTop=el.scrollHeight},60)
}

function apagarMsgChat(id){
  confirmarModal('Apagar esta mensagem?',async()=>{
    if(!_fdb)return
    try{await _fdb.collection('at_chat').doc(id).delete()}
    catch(e){toast('Erro ao apagar','warn')}
  })
}

async function sendChatMsg(){
  const inp=document.getElementById('chatInput')
  if(!inp||!_fdb)return
  const text=inp.value.trim()
  if(!text)return
  const u=currentUser()
  inp.value=''
  inp.focus()
  try{await _fdb.collection('at_chat').add({from:u.user,fromNome:u.nome||u.user,text,ts:Date.now()})}
  catch(e){toast('Erro ao enviar','warn');inp.value=text}
}

function _initChatListener(){
  if(_chatUnsub||!_fdb)return
  const me=currentUser().user
  _chatUnsub=_fdb.collection('at_chat').orderBy('ts','asc').onSnapshot(snap=>{
    const lastRead=parseInt(localStorage.getItem('chat_lr_'+me)||'0')
    const prev=_chatMsgs.length
    _chatMsgs=snap.docs.map(d=>({id:d.id,...d.data()}))
    const novas=_chatMsgs.filter(m=>m.ts>lastRead&&m.from!==me)
    _chatUnread=novas.length
    updateChatBadge()
    if(_page==='chat'){renderChat()}
    else if(_chatMsgs.length>prev&&novas.length>0){_chatNotify(novas[novas.length-1])}
  },()=>{})
}

function _markChatRead(){
  const me=currentUser().user
  const lastTs=_chatMsgs.length?Math.max(..._chatMsgs.map(m=>m.ts)):Date.now()
  localStorage.setItem('chat_lr_'+me,String(lastTs))
  _chatUnread=0
  updateChatBadge()
}

function updateChatBadge(){
  const b=document.getElementById('bdg-chat')
  if(b){b.style.display=_chatUnread?'':'none';b.textContent=_chatUnread}
  const bm=document.getElementById('bdg-chat-mob')
  if(bm){bm.style.display=_chatUnread?'':'none';bm.textContent=_chatUnread}
}

async function _chatNotify(msg){
  if(!('Notification' in window)||Notification.permission!=='granted')return
  try{
    const sw=await navigator.serviceWorker.ready
    sw.showNotification('💬 '+(msg.fromNome||msg.from),{
      body:msg.text,icon:'icons/icon.svg',badge:'icons/icon.svg',
      tag:'chat-msg',renotify:true,vibrate:[150,80,150]
    })
  }catch(e){}
}

async function _requestNotifPerm(){
  if('Notification' in window&&Notification.permission==='default'){
    const p=await Notification.requestPermission()
    if(p==='granted')toast('Notificações ativadas ✓','ok')
  }
}

    document.querySelectorAll('.sb-item').forEach(el=>{
      if(el.id&&el.id!=='sb-orcamentos'&&el.id!=='sb-chat')el.style.display='none'
    })
    document.querySelectorAll('.sb-sec').forEach(el=>el.style.display='none')
    document.querySelector('.sb-bot').style.display='flex'
  }
  nav(isAdmin()?'dashboard':'orcamentos')
  updateBadges()
  _initFirebase().then(()=>{if(_syncEnabled){nav(_page)};_initChatListener()})
}

function updateBadges(){
  const pendentes=(DB.get(S.ORC)||[]).filter(o=>o.status==='enviado').length
  const bo=document.getElementById('bdg-orc')
  if(bo){bo.style.display=pendentes?'':'none';bo.textContent=pendentes}
  const abertas=(DB.get(S.OS)||[]).filter(o=>o.status==='aberta'||o.status==='andamento').length
  const bos=document.getElementById('bdg-os')
  if(bos){bos.style.display=abertas?'':'none';bos.textContent=abertas}
  updateChatBadge()
}

let _cfgReady=null
document.addEventListener('DOMContentLoaded',()=>{
  const sigToken=new URLSearchParams(location.search).get('sig')
  if(sigToken){
    document.getElementById('loginOv').style.display='none'
    document.getElementById('sigPage').style.display='block'
    _loadSigPage(sigToken)
    return
  }
  if(sessionStorage.getItem('at_ok')){
    document.getElementById('loginOv').style.display='none'
    document.getElementById('app').style.display='flex'
    initApp()
  }else{
    // Pré-carrega config do Firebase antes do login
    _cfgReady=_preLoadCfg().catch(e=>{console.warn('preload err:',e)})
    const el=document.getElementById('loginInfo')
    if(el){el.textContent='🔄 Conectando...';el.style.color='#aaa'}
    _cfgReady.then(()=>{if(el)el.textContent=''})
    document.getElementById('loginPass').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin()})
  }
})
</script>
<script>
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{navigator.serviceWorker.register('./sw.js').catch(()=>{})})
  navigator.serviceWorker.addEventListener('message',e=>{if(e.data?.type==='openChat')nav('chat')})
}
</script>
</body>
</html>
