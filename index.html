<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>⚡ AccertTech — Orçamentos Elétrica</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Segoe UI',system-ui,sans-serif;background:#0F1117;color:#E8EDF5;font-size:14px}
:root{
  --bg:#0F1117;--sb:#13171F;--card:#1A1F2E;--card2:#1E2535;
  --b:#252D40;--b2:#2E3850;--b3:#3A4660;
  --pri:#2196F3;--prid:#1565C0;--pril:#42A5F5;
  --acc:#FFB300;--suc:#4CAF50;--wrn:#FF9800;--dan:#F44336;
  --txt:#E8EDF5;--txt2:#B0BCCF;--txt3:#6B7A94;--txt4:#3D4A62;
  --r:10px;--rs:6px;--sh:0 4px 24px rgba(0,0,0,.4);--sw:220px
}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--b2);border-radius:10px}
.app{display:flex;height:100vh;overflow:hidden}
.sidebar{width:var(--sw);background:var(--sb);border-right:1px solid var(--b);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto;transition:transform .2s}
.main{flex:1;overflow-y:auto;display:flex;flex-direction:column;min-width:0}
.topbar{background:var(--card);border-bottom:1px solid var(--b);padding:0 22px;height:54px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.content{padding:22px;flex:1}
.sb-logo{padding:18px 16px 14px;border-bottom:1px solid var(--b);display:flex;align-items:center;gap:10px}
.sb-logo-icon{font-size:24px;flex-shrink:0}
.sb-logo-name{font-size:14px;font-weight:800;color:var(--txt);line-height:1.2}
.sb-logo-sub{font-size:9px;color:var(--txt3);letter-spacing:1.5px;text-transform:uppercase}
.sb-nav{padding:10px 6px;flex:1}
.sb-sec{font-size:9px;font-weight:700;letter-spacing:1.8px;text-transform:uppercase;color:var(--txt4);padding:10px 10px 4px}
.sb-item{display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:var(--rs);cursor:pointer;color:var(--txt2);font-size:13px;font-weight:500;transition:all .15s;margin-bottom:1px;border:none;background:none;width:100%;text-align:left}
.sb-item:hover{background:var(--card);color:var(--txt)}
.sb-item.active{background:rgba(33,150,243,.15);color:var(--pri);font-weight:700}
.sb-item .ico{font-size:15px;width:18px;text-align:center;flex-shrink:0}
.sb-bdg{margin-left:auto;background:var(--pri);color:#fff;font-size:9px;font-weight:700;padding:2px 6px;border-radius:10px;min-width:18px;text-align:center}
.sb-bdg.red{background:var(--dan)}
.sb-bot{padding:10px 6px;border-top:1px solid var(--b)}
.pg-title{font-size:16px;font-weight:700;color:var(--txt)}
.menu-btn{display:none;background:none;border:none;color:var(--txt2);font-size:20px;cursor:pointer;padding:4px}
.card{background:var(--card);border:1px solid var(--b);border-radius:var(--r);padding:18px}
.card-sm{padding:14px 16px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.metric-ico{font-size:20px;margin-bottom:8px}
.metric-val{font-size:24px;font-weight:800;color:var(--txt);line-height:1}
.metric-lbl{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--txt3);margin-top:4px}
.metric-sub{font-size:11px;color:var(--txt3);margin-top:3px}
.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th{padding:9px 12px;background:var(--card2);color:var(--txt3);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;text-align:left;border-bottom:1px solid var(--b);white-space:nowrap}
.tbl td{padding:10px 12px;border-bottom:1px solid var(--b);color:var(--txt2);vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:rgba(33,150,243,.04);cursor:pointer}
.tbl-wrap{overflow-x:auto;border-radius:var(--r);border:1px solid var(--b)}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 15px;border-radius:var(--rs);font-size:13px;font-weight:600;cursor:pointer;border:1.5px solid transparent;transition:all .15s;font-family:inherit;line-height:1;white-space:nowrap}
.btn-p{background:var(--pri);color:#fff;border-color:var(--pri)}.btn-p:hover{background:var(--prid)}
.btn-o{background:transparent;color:var(--txt2);border-color:var(--b2)}.btn-o:hover{background:var(--card2);color:var(--txt)}
.btn-s{background:var(--suc);color:#fff;border-color:var(--suc)}
.btn-d{background:var(--dan);color:#fff;border-color:var(--dan)}
.btn-w{background:var(--wrn);color:#1A1A1A;border-color:var(--wrn)}
.btn-a{background:var(--acc);color:#1A1A1A;border-color:var(--acc)}
.btn-g{background:transparent;color:var(--txt3);border-color:transparent;padding:6px 10px}.btn-g:hover{color:var(--txt);background:var(--card2)}
.btn-sm{padding:5px 11px;font-size:12px}.btn-xs{padding:3px 8px;font-size:11px;border-radius:4px}
.btn-ico{padding:7px;border-radius:var(--rs)}
label{display:block;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--txt3);margin-bottom:4px}
input,select,textarea{width:100%;padding:9px 11px;background:#0A0D14;border:1.5px solid var(--b2);border-radius:var(--rs);color:var(--txt);font-size:13px;font-family:inherit;outline:none;transition:border .15s}
input:focus,select:focus,textarea:focus{border-color:var(--pri)}
input::placeholder,textarea::placeholder{color:var(--txt4)}
select option{background:var(--card)}
textarea{resize:vertical;min-height:70px}
.fr{display:grid;gap:12px;margin-bottom:12px}.fr.c2{grid-template-columns:1fr 1fr}.fr.c3{grid-template-columns:1fr 1fr 1fr}.fr.c4{grid-template-columns:1fr 1fr 1fr 1fr}
.fg{display:flex;flex-direction:column}
.bdg{display:inline-flex;align-items:center;gap:3px;padding:3px 8px;border-radius:20px;font-size:10px;font-weight:700;text-transform:uppercase}
.bdg-b{background:rgba(33,150,243,.15);color:#42A5F5}
.bdg-g{background:rgba(76,175,80,.15);color:#66BB6A}
.bdg-y{background:rgba(255,179,0,.15);color:var(--acc)}
.bdg-r{background:rgba(244,67,54,.15);color:#EF5350}
.bdg-gr{background:rgba(107,122,148,.15);color:#8A9BB5}
.bdg-o{background:rgba(255,152,0,.15);color:#FFA726}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:1000;align-items:center;justify-content:center;backdrop-filter:blur(2px)}
.modal-bg.open{display:flex}
.modal{background:var(--card);border:1px solid var(--b2);border-radius:14px;width:min(680px,95vw);max-height:92vh;overflow-y:auto;box-shadow:var(--sh);animation:fu .2s ease}
.modal-w{width:min(860px,95vw)}.modal-xl{width:min(1050px,97vw)}
.mhdr{padding:18px 20px 14px;border-bottom:1px solid var(--b);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--card);z-index:2}
.mtitle{font-size:15px;font-weight:700;color:var(--txt)}
.mbody{padding:18px 20px}
.mfoot{padding:12px 20px;border-top:1px solid var(--b);display:flex;gap:8px;justify-content:flex-end;position:sticky;bottom:0;background:var(--card)}
@keyframes fu{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.chip{display:inline-flex;align-items:center;gap:3px;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600;background:var(--card2);border:1px solid var(--b);color:var(--txt3);cursor:pointer;transition:all .15s;user-select:none}
.chip.sel{background:rgba(33,150,243,.18);border-color:var(--pri);color:var(--pril)}
.chip:hover:not(.sel){border-color:var(--txt3);color:var(--txt2)}
.chips{display:flex;flex-wrap:wrap;gap:5px}
.divider{height:1px;background:var(--b);margin:14px 0}
.sh{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.stitle{font-size:14px;font-weight:700;color:var(--txt)}
.ssub{font-size:11px;color:var(--txt3);margin-top:1px}
.empty{text-align:center;padding:50px 20px;color:var(--txt3)}
.empty-ico{font-size:40px;margin-bottom:10px}
.empty-t{font-size:14px;font-weight:600;color:var(--txt2);margin-bottom:5px}
.empty-s{font-size:12px}
#toast{position:fixed;bottom:22px;right:22px;z-index:9999;display:flex;flex-direction:column;gap:7px;pointer-events:none}
.ti{padding:11px 16px;border-radius:9px;font-size:13px;font-weight:600;opacity:0;transform:translateX(18px);transition:all .3s;max-width:300px;display:flex;align-items:center;gap:7px}
.ti-ok{background:#1B5E20;border:1px solid #2E7D32;color:#A5D6A7}
.ti-w{background:#B71C1C;border:1px solid#C62828;color:#EF9A9A}
.ti-i{background:#0D47A1;border:1px solid #1565C0;color:#90CAF9}
.ti-show{opacity:1;transform:translateX(0)}
#loginOv{position:fixed;inset:0;background:#080A10;z-index:5000;display:flex;align-items:center;justify-content:center}
.lbox{background:var(--card);border:1px solid var(--b2);border-radius:16px;padding:34px 38px;width:min(360px,90vw);text-align:center}
.lbox-ico{font-size:36px;margin-bottom:6px}
.lbox-t{font-size:19px;font-weight:800;color:var(--txt);margin-bottom:3px}
.lbox-s{font-size:10px;color:var(--txt3);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:26px}
.lbox input{margin-bottom:10px}
.lbox .btn-p{width:100%;justify-content:center;padding:11px}
.atag{display:inline-flex;align-items:center;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:700}
.atag-b{background:rgba(33,150,243,.12);color:var(--pril);border:1px solid rgba(33,150,243,.2)}
.atag-y{background:rgba(255,179,0,.12);color:var(--acc);border:1px solid rgba(255,179,0,.2)}
.atag-g{background:rgba(76,175,80,.12);color:#66BB6A;border:1px solid rgba(76,175,80,.2)}
.atag-r{background:rgba(244,67,54,.12);color:#EF5350;border:1px solid rgba(244,67,54,.2)}
.atag-o{background:rgba(255,152,0,.12);color:#FFA726;border:1px solid rgba(255,152,0,.2)}
.orc-item{background:var(--card2);border:1px solid var(--b);border-radius:8px;padding:10px 12px;margin-bottom:8px}
.orc-item-top{display:grid;grid-template-columns:1fr 70px 90px 90px 80px 30px;gap:8px;align-items:center}
.orc-item-bot{margin-top:8px;padding-top:8px;border-top:1px solid var(--b)}
.tab-btns{display:flex;gap:4px;background:var(--card2);border:1px solid var(--b);border-radius:8px;padding:3px}
.tab-btn{padding:7px 16px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;border:none;background:none;color:var(--txt3);font-family:inherit;transition:all .15s}
.tab-btn.active{background:var(--card);color:var(--txt);box-shadow:0 1px 4px rgba(0,0,0,.3)}
.info-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:1px;background:var(--b);border:1px solid var(--b);border-radius:8px;overflow:hidden;margin-bottom:14px}
.info-cell{background:var(--card2);padding:10px 14px}
.info-lbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--txt3);margin-bottom:3px}
.info-val{font-size:13px;font-weight:700;color:var(--txt)}
.attr-block{background:var(--card2);border:1px solid var(--b);border-radius:8px;padding:14px;margin-bottom:12px}
.attr-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--pri);margin-bottom:10px;display:flex;align-items:center;gap:6px}
@media(max-width:900px){.g4{grid-template-columns:1fr 1fr}.g3{grid-template-columns:1fr 1fr}}
@media(max-width:720px){
  .sidebar{position:fixed;left:0;top:0;bottom:0;z-index:200;transform:translateX(-100%)}
  .sidebar.mob-open{transform:translateX(0)}
  .menu-btn{display:block}
  .content{padding:14px}
  .topbar{padding:0 14px}
  .fr.c3,.fr.c4{grid-template-columns:1fr 1fr}
  .g2,.g3,.g4{grid-template-columns:1fr}
  .orc-item-top{grid-template-columns:1fr 60px 80px 30px}
}
@media(max-width:480px){.fr.c2,.fr.c3,.fr.c4{grid-template-columns:1fr}}
@media print{.no-print{display:none!important}body{background:#fff;color:#000}}
</style>
</head>
<body>

<div id="loginOv">
  <div class="lbox">
    <div class="lbox-ico">⚡</div>
    <div class="lbox-t">AccertTech</div>
    <div class="lbox-s">Orçamentos Elétrica</div>
    <input type="text" id="loginUser" placeholder="Usuário" autocomplete="username">
    <input type="password" id="loginPass" placeholder="Senha" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()">
    <div id="loginInfo" style="font-size:12px;color:#aaa;min-height:18px;margin:4px 0;text-align:center"></div>
    <br>
    <button class="btn btn-p" onclick="doLogin()">⚡ Entrar</button>
    <button class="btn" style="margin-top:8px;font-size:12px;background:transparent;border:1px solid #555;color:#aaa" onclick="debugFirebase()">🔍 Ver usuários do Firebase</button>
  </div>
</div>

<div id="app" class="app" style="display:none">
  <nav class="sidebar" id="sidebar">
    <div class="sb-logo">
      <div class="sb-logo-icon">⚡</div>
      <div><div class="sb-logo-name">AccertTech</div><div class="sb-logo-sub">Elétrica</div></div>
    </div>
    <div class="sb-nav">
      <div class="sb-sec">Principal</div>
      <button class="sb-item active" id="sb-dashboard" onclick="nav('dashboard')"><span class="ico">📊</span>Dashboard</button>
      <button class="sb-item" id="sb-orcamentos" onclick="nav('orcamentos')"><span class="ico">📋</span>Orçamentos<span class="sb-bdg" id="bdg-orc" style="display:none">0</span></button>
      <button class="sb-item" id="sb-os" onclick="nav('os')"><span class="ico">🔧</span>Ordens de Serviço<span class="sb-bdg red" id="bdg-os" style="display:none">0</span></button>
      <div class="sb-sec">Cadastros</div>
      <button class="sb-item" id="sb-clientes" onclick="nav('clientes')"><span class="ico">👥</span>Clientes</button>
      <button class="sb-item" id="sb-produtos" onclick="nav('produtos')"><span class="ico">🔌</span>Produtos / Serviços</button>
      <button class="sb-item" id="sb-estoque" onclick="nav('estoque')"><span class="ico">📦</span>Estoque</button>
      <div class="sb-sec">Financeiro</div>
      <button class="sb-item" id="sb-financeiro" onclick="nav('financeiro')"><span class="ico">💰</span>Financeiro</button>
      <div class="sb-sec">Sistema</div>
      <button class="sb-item" id="sb-config" onclick="nav('config')"><span class="ico">⚙️</span>Configurações</button>
    </div>
    <div class="sb-bot">
      <button class="sb-item" onclick="logout()"><span class="ico">🚪</span>Sair</button>
    </div>
  </nav>
  <div class="main">
    <div class="topbar">
      <div style="display:flex;align-items:center;gap:10px">
        <button class="menu-btn" onclick="toggleSidebar()">☰</button>
        <div class="pg-title" id="pageTitle">Dashboard</div>
      </div>
      <div style="display:flex;align-items:center;gap:10px">
        <span id="syncBadge" title="Verificando sincronização..." style="font-size:18px;cursor:default;color:var(--txt4)">⬤</span>
        <span style="font-size:11px;color:var(--txt3)" id="topEmp"></span>
      </div>
    </div>
    <div class="content" id="content"></div>
  </div>
</div>

<div class="modal-bg" id="modalBg">
  <div class="modal" id="modal">
    <div class="mhdr">
      <div class="mtitle" id="modalTitle"></div>
      <button class="btn btn-g btn-ico" onclick="closeModal()">✕</button>
    </div>
    <div class="mbody" id="modalBody"></div>
    <div class="mfoot" id="modalFoot"></div>
  </div>
</div>

<div class="modal-bg" id="cfmBg">
  <div class="modal" style="width:min(400px,90vw)">
    <div class="mhdr"><div class="mtitle">Confirmar</div><button class="btn btn-g btn-ico" onclick="document.getElementById('cfmBg').classList.remove('open')">✕</button></div>
    <div class="mbody" id="cfmBody" style="font-size:14px;line-height:1.6;color:var(--txt2)"></div>
    <div class="mfoot"><button class="btn btn-o btn-sm" onclick="document.getElementById('cfmBg').classList.remove('open')">Cancelar</button><button class="btn btn-d btn-sm" id="cfmOk">Confirmar</button></div>
  </div>
</div>

<div id="toast"></div>
<div id="sideOverlay" style="display:none;position:fixed;inset:0;z-index:199;background:rgba(0,0,0,.5)" onclick="toggleSidebar()"></div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script>
// ── Storage ──
const S={EMP:'at_emp',CLI:'at_cli',PRO:'at_pro',ORC:'at_orc',OS:'at_os',FIN:'at_fin',EST:'at_est',CFG:'at_cfg'}
const DB={
  get:k=>{try{return JSON.parse(localStorage.getItem(k)||'null')}catch{return null}},
  set:(k,v)=>{localStorage.setItem(k,JSON.stringify(v));_fsSync(k,v)}
}

// ── Firebase Sync ──
const _AT_FB={
  apiKey:'AIzaSyBq7kbt5t9KIR196u9mEeGn0g0BLkgAlCQ',
  authDomain:'laberna-dulce.firebaseapp.com',
  projectId:'laberna-dulce',
  storageBucket:'laberna-dulce.firebasestorage.app',
  messagingSenderId:'355799786526',
  appId:'1:355799786526:web:3bf1f988bb0cda65ddfa0f'
}
// Sync via coleção 'assinaturas' (regras existentes) com prefixo 'ate_'
// Busca por ID de documento — sem precisar de índice Firestore
const _AT_PFX='ate_'
const _FS_KEYS={[S.CLI]:'cli',[S.PRO]:'pro',[S.ORC]:'orc',[S.OS]:'os',[S.FIN]:'fin',[S.EST]:'est',[S.EMP]:'emp',[S.CFG]:'cfg'}
let _fdb=null,_syncEnabled=false

function _fsSync(key,data){
  if(!_fdb||!_syncEnabled)return
  const k=_FS_KEYS[key];if(!k)return
  const docId=_AT_PFX+k+'_'+Date.now()
  _fdb.collection('assinaturas').doc(docId).set({
    _ate:true,_key:key,data:JSON.stringify(data),ts:Date.now()
  }).catch(e=>console.warn('sync:',e))
}

// Lê TODOS os docs da coleção e filtra pelo prefixo 'ate_' — sem índice necessário
async function _fsGetAll(){
  const snap=await _fdb.collection('assinaturas').get()
  const latest={}
  snap.docs.forEach(doc=>{
    if(!doc.id.startsWith(_AT_PFX))return // ignora docs da Labernadulce
    const d=doc.data()
    if(!d._key)return
    if(!latest[d._key]||d.ts>latest[d._key].ts)latest[d._key]=d
  })
  return latest
}

async function _fsLoad(){
  if(!_fdb)return
  try{
    const latest=await _fsGetAll()
    Object.entries(latest).forEach(([key,d])=>{if(d.data)localStorage.setItem(key,d.data)})
  }catch(e){console.warn('fsLoad:',e)}
}

function _fsListen(){
  if(!_fdb)return
  // Ouve TODA a coleção e filtra pelo prefixo — funciona sem índice
  _fdb.collection('assinaturas').onSnapshot(snap=>{
    if(!_syncEnabled)return
    const latest={}
    snap.docs.forEach(doc=>{
      if(!doc.id.startsWith(_AT_PFX))return
      const d=doc.data()
      if(!d._key)return
      if(!latest[d._key]||d.ts>latest[d._key].ts)latest[d._key]=d
    })
    Object.entries(latest).forEach(([key,d])=>{
      const incoming=d.data;if(!incoming)return
      const current=localStorage.getItem(key)
      if(incoming!==current){localStorage.setItem(key,incoming);_onRemoteUpdate(key)}
    })
  })
}

function _onRemoteUpdate(key){
  _setSyncBadge('ok')
  updateBadges()
  const pageMap={[S.CLI]:'clientes',[S.PRO]:'produtos',[S.ORC]:'orcamentos',[S.OS]:'os',[S.FIN]:'financeiro',[S.EST]:'estoque',[S.EMP]:'config'}
  const p=pageMap[key]
  if(p&&_page===p){const renders={clientes:renderClientes,produtos:renderProdutos,orcamentos:renderOrcamentos,os:renderOS,financeiro:renderFinanceiro,estoque:renderEstoque,config:renderConfig};if(renders[p])renders[p]()}
  if(_page==='dashboard')renderDashboard()
  if(!document.getElementById('modalBg').classList.contains('open'))toast('🔄 Dados atualizados de outro dispositivo','info',2500)
}

function _setSyncBadge(state){
  const el=document.getElementById('syncBadge');if(!el)return
  if(state==='ok'){el.style.color='var(--suc)';el.title='Sincronizado'}
  else if(state==='sync'){el.style.color='var(--acc)';el.title='Sincronizando...'}
  else{el.style.color='var(--txt4)';el.title='Sem conexão — dados locais'}
}

async function _initFirebase(){
  try{
    if(!_fdb){
      if(!firebase.apps.length)firebase.initializeApp(_AT_FB)
      _fdb=firebase.firestore()
      _fdb.settings({experimentalForceLongPolling:true,merge:true})
    }
    _setSyncBadge('sync')
    // 1. Sobe dados locais para Firebase (migração / garante que PC está no Firebase)
    _syncEnabled=true
    await Promise.all(Object.keys(_FS_KEYS).map(async k=>{
      const d=DB.get(k);if(d===null)return
      const fk=_FS_KEYS[k]
      const docId=_AT_PFX+fk+'_'+Date.now()+'_'+Math.random().toString(36).slice(2,6)
      await _fdb.collection('assinaturas').doc(docId).set({_ate:true,_key:k,data:JSON.stringify(d),ts:Date.now()}).catch(e=>console.warn('upload:',e))
    }))
    // 2. Firebase é a fonte da verdade — baixa tudo
    await _fsLoad()
    // 3. Ouve mudanças em tempo real de outros dispositivos
    _fsListen()
    _setSyncBadge('ok')
  }catch(e){console.warn('Firebase:',e);_setSyncBadge('offline')}
}

// ── Utils ──
function genId(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7)}
function fmt(v,d=2){return new Intl.NumberFormat('pt-BR',{minimumFractionDigits:d,maximumFractionDigits:d}).format(v||0)}
function fmtR(v){return'R$ '+fmt(v)}
function fmtDate(d){if(!d)return'';const p=d.split('-');return p.length===3?p[2]+'/'+p[1]+'/'+p[0]:d}
function today(){return new Date().toISOString().slice(0,10)}
function addDays(d,n){const dt=new Date(d+'T12:00:00');dt.setDate(dt.getDate()+n);return dt.toISOString().slice(0,10)}
function nextNum(list,field='num'){return(list||[]).reduce((a,x)=>Math.max(a,parseInt(x[field]||0)),0)+1}
function catNome(id){return(CATS.find(c=>c.id===id)||{nome:id}).nome}
function catIco(id){return(CATS.find(c=>c.id===id)||{ico:'📦'}).ico}
function cliNome(id){const c=(DB.get(S.CLI)||[]).find(x=>x.id===id);return c?c.nome:'—'}
function orcNumFmt(n){return'ORC-'+String(n||0).padStart(4,'0')}
function osNumFmt(n){return'OS-'+String(n||0).padStart(4,'0')}
function getEmpresa(){return DB.get(S.EMP)||{nome:'AccertTech',fantasia:'AccertTech',fone:'',email:'',resp:'',crea:''}}

function toast(msg,type='ok',dur=3500){
  const el=document.createElement('div')
  el.className=`ti ti-${type==='ok'?'ok':type==='warn'?'w':'i'}`
  el.innerHTML=(type==='ok'?'✓':type==='warn'?'✕':'ℹ')+' '+msg
  document.getElementById('toast').appendChild(el)
  setTimeout(()=>el.classList.add('ti-show'),10)
  setTimeout(()=>{el.classList.remove('ti-show');setTimeout(()=>el.remove(),300)},dur)
}

function _getUsers(){
  const cfg=DB.get(S.CFG)||{}
  // compatibilidade com formato antigo (só um user)
  if(cfg.users)return cfg.users
  return [{user:cfg.user||'admin',pass:cfg.pass||'1234',role:'admin',nome:'Admin'}]
}
function currentUser(){try{return JSON.parse(sessionStorage.getItem('at_session')||'{}')}catch{return{}}}
function isAdmin(){return currentUser().role==='admin'}

async function doLogin(){
  const u=document.getElementById('loginUser').value.trim()
  const p=document.getElementById('loginPass').value
  const btn=document.querySelector('#loginOv .btn-p')
  if(btn){btn.disabled=true;btn.textContent='Verificando...'}
  // Tenta local primeiro (rápido)
  let found=_getUsers().find(x=>x.user===u&&x.pass===p)
  // Se não achou, aguarda o Firebase (já iniciado no DOMContentLoaded)
  if(!found){
    try{
      if(btn)btn.textContent='Sincronizando...'
      await (_cfgReady||_preLoadCfg())
      found=_getUsers().find(x=>x.user===u&&x.pass===p)
    }catch(e){console.warn('preload cfg:',e)}
  }
  if(btn){btn.disabled=false;btn.textContent='⚡ Entrar'}
  if(found){
    sessionStorage.setItem('at_ok','1')
    sessionStorage.setItem('at_session',JSON.stringify(found))
    document.getElementById('loginOv').style.display='none'
    document.getElementById('app').style.display='flex'
    initApp()
  }else{
    const users=_getUsers()
    const userNames=users.map(x=>x.user).join(', ')
    toast('Usuário inválido. Usuários: '+userNames,'warn',6000)
    document.getElementById('loginPass').value=''
  }
}

async function _preLoadCfg(){
  if(!_fdb){
    try{
      if(!firebase.apps.length)firebase.initializeApp(_AT_FB)
      _fdb=firebase.firestore()
      _fdb.settings({experimentalForceLongPolling:true,merge:true})
    }catch(e){console.warn('fb init:',e);return}
  }
  try{
    const latest=await _fsGetAll()
    if(latest[S.CFG]&&latest[S.CFG].data){
      localStorage.setItem(S.CFG,latest[S.CFG].data)
      console.log('Config sincronizado do Firebase')
    }
  }catch(e){console.warn('preLoadCfg:',e)}
}

function getAttrTags(p){
  const tags=[]
  if(p.cor)tags.push(`<span class="atag atag-b">${p.cor}</span>`)
  if(p.botoes)tags.push(`<span class="atag atag-y">${p.botoes} botão${p.botoes>1?'ões':''}</span>`)
  if(p.temTomada)tags.push(`<span class="atag atag-g">c/ tomada</span>`)
  if(p.wifi)tags.push(`<span class="atag atag-b">Wi-Fi</span>`)
  if(p.bitola)tags.push(`<span class="atag atag-o">${p.bitola}mm²</span>`)
  if(p.potencia)tags.push(`<span class="atag atag-y">${p.potencia}</span>`)
  if(p.tempCor)tags.push(`<span class="atag atag-b">${p.tempCor}</span>`)
  if(p.corrente)tags.push(`<span class="atag atag-r">${p.corrente}</span>`)
  if(p.polo)tags.push(`<span class="atag atag-o">${p.polo}</span>`)
  if(p.tipoServico)tags.push(`<span class="atag atag-g">${p.tipoServico}</span>`)
  return tags.join(' ')||'<span style="color:var(--txt4);font-size:11px">—</span>'
}

function updateAttrFields(){
  const cat=document.getElementById('pCat').value
  document.getElementById('attrArea').innerHTML=attrFields(cat)
}

function salvarProduto(id){
  const nome=v('pNome').trim()
  if(!nome)return toast('Informe o nome do produto','warn')
  const cat=v('pCat')
  const pu=parseFloat(v('pPu'))||0
  const list=DB.get(S.PRO)||[]
  const gc=f=>document.getElementById('pa_'+f)
  const gcv=f=>{const el=gc(f);return el?(el.type==='checkbox'?el.checked:el.value)||'':''}
  const data={id:id||genId(),cat,nome,pu,un:v('pUn'),desc:v('pDesc'),cod:v('pCod')}
  // Category-specific attributes
  const attrs=['cor','botoes','tipo','voltagem','temTomada','wifi','corrente','tipoTomada','protInf',
    'potencia','tempCor','recorte','tensao','marca','tipoLed','ip','bitola','tipoCabo','material',
    'diametro','tipoEl','polos','tipoQD','embutir','tipoDisj','polo','sensibilidade',
    'tipoAuto','protocolo','compatibilidade','tipoServico','unServico']
  attrs.forEach(a=>{const el=document.getElementById('pa_'+a);if(el){const val=el.type==='checkbox'?el.checked:el.value;if(val!==''&&val!==false)data[a]=val}})
  if(id){const i=list.findIndex(x=>x.id===id);if(i>=0)list[i]=data;else list.push(data)}else list.push(data)
  DB.set(S.PRO,list);closeModal();toast('Produto salvo');renderProdutos()
}

function excluirProduto(id){
  confirmarModal('Excluir este produto?',()=>{
    DB.set(S.PRO,(DB.get(S.PRO)||[]).filter(x=>x.id!==id));toast('Produto excluído');renderProdutos()
  })
}

function orcAddItem(){
  _orcItens.push({prodId:'_custom',nome:'',qtd:1,un:'un',pu:0,sub:0,locais:[],obs:''})
  document.getElementById('orcItensArea').innerHTML=renderOrcItens()
  recalcOrc()
}

function orcRemItem(i){_orcItens.splice(i,1);document.getElementById('orcItensArea').innerHTML=renderOrcItens();recalcOrc()}

function orcSetProd(i,prodId){
  if(prodId==='_custom'){_orcItens[i]={..._orcItens[i],prodId:'_custom',nome:'',pu:0}}
  else{
    const p=(DB.get(S.PRO)||[]).find(x=>x.id===prodId)
    if(p){
      const {id:_,...attrs}=p
      _orcItens[i]={..._orcItens[i],...attrs,prodId}
    }
  }
  document.getElementById('orcItensArea').innerHTML=renderOrcItens()
  recalcOrc()
}

function orcToggleLocal(i,local){
  const loc=_orcItens[i].locais||[]
  const idx=loc.indexOf(local)
  if(idx>=0)loc.splice(idx,1);else loc.push(local)
  _orcItens[i].locais=loc
  // Update chips without full re-render
  const area=document.getElementById('orcItem'+i)
  if(area){const chips=area.querySelectorAll('.chip');chips.forEach(c=>{const sel=loc.includes(c.textContent.trim());c.classList.toggle('sel',sel)})}
}

function recalcOrc(){
  let sub=0
  _orcItens.forEach((it,i)=>{
    const s=(it.qtd||1)*(it.pu||0)
    it.sub=s;sub+=s
    const el=document.getElementById('orcSub'+i)
    if(el)el.textContent=fmtR(s)
  })
  const desc=parseFloat(document.getElementById('oDesc')?.value)||0
  const total=Math.max(0,sub-desc)
  const st=document.getElementById('oSubtotal')
  const sd=document.getElementById('oDescDisp')
  const tt=document.getElementById('oTotalDisp')
  if(st)st.textContent=fmtR(sub)
  if(sd)sd.textContent=fmtR(desc)
  if(tt)tt.textContent=fmtR(total)
}

function salvarOrcamento(id){
  const cliId=v('oCli')
  if(!cliId)return toast('Selecione um cliente','warn')
  if(!_orcItens.length)return toast('Adicione pelo menos um item','warn')
  // sync nomes de custom items
  _orcItens.forEach((it,i)=>{if(it.prodId==='_custom'){const el=document.getElementById('orcItemNome'+i);if(el)it.nome=el.value}})
  const desc=parseFloat(v('oDesc'))||0
  const sub=_orcItens.reduce((a,it)=>a+(it.sub||0),0)
  const totalF=Math.max(0,sub-desc)
  const list=DB.get(S.ORC)||[]
  const valDias=parseInt(v('oVal'))||30
  const data={
    id:id||genId(),num:id?list.find(x=>x.id===id)?.num||nextNum(list):nextNum(list),
    cliId,data:v('oData'),valDias,validade:addDays(v('oData'),valDias),
    endObra:v('oEnd'),resp:v('oResp'),desc,pgto:v('oPgto'),
    status:v('oStatus'),obs:v('oObs'),
    itens:_orcItens,sub,totalF,
    criadoPor:id?(list.find(x=>x.id===id)?.criadoPor||currentUser().user):currentUser().user
  }
  if(id){const i=list.findIndex(x=>x.id===id);if(i>=0)list[i]=data;else list.push(data)}else list.push(data)
  DB.set(S.ORC,list);closeModal();toast('Orçamento salvo');renderOrcamentos()
}

const CAT_FIN={entrada:['Recebimento de OS','Recebimento de Orçamento','Adiantamento','Outros'],saida:['Materiais / Insumos','Ferramentas / Equipamentos','Combustível / Transporte','Impostos / Taxas','Salários / Mão de Obra','Outros']}

  const sorted=[...fins].sort((a,b)=>b.data.localeCompare(a.data))
  const entrada=fins.filter(f=>f.tipo==='entrada').reduce((a,f)=>a+(f.valor||0),0)

  </div>
  <div class="tbl-wrap"><table class="tbl">
    <thead><tr><th>Data</th><th>Tipo</th><th>Categoria</th><th>Descrição</th><th>Valor</th><th></th></tr></thead>

  </table></div>`

function updateCatFin(){

function salvarUsuario(editUser){
  const userLogin=editUser||v('uUser').trim()
  const nome=v('uNome').trim()
  const pass=v('uPass')
  const role=v('uRole')
  if(!userLogin)return toast('Informe o login do usuário','warn')
  if(!nome)return toast('Informe o nome','warn')
  if(!editUser&&!pass)return toast('Informe a senha','warn')
  const cfg=DB.get(S.CFG)||{}
  const users=_getUsers()
  const idx=users.findIndex(x=>x.user===userLogin)
  const data={user:userLogin,nome,role,modules:role==='admin'?[]:['orcamentos']}
  if(idx>=0){data.pass=pass||users[idx].pass;users[idx]=data}
  else{if(users.find(x=>x.user===userLogin))return toast('Usuário já existe','warn');data.pass=pass;users.push(data)}
  cfg.users=users
  DB.set(S.CFG,cfg)
  closeModal();toast('Usuário salvo');renderConfig()
}

function excluirUsuario(user){
  confirmarModal(`Excluir o usuário <strong>${user}</strong>?`,()=>{
    const cfg=DB.get(S.CFG)||{}
    cfg.users=_getUsers().filter(x=>x.user!==user)
    DB.set(S.CFG,cfg);toast('Usuário excluído');renderConfig()
  })
}

  const e={nome:v('cfgNome'),fantasia:v('cfgFantasia'),doc:v('cfgDoc'),crea:v('cfgCrea'),fone:v('cfgFone'),wa:v('cfgWa'),email:v('cfgEmail'),end:v('cfgEnd'),resp:v('cfgResp'),obsOrc:v('cfgObs')}
  DB.set(S.EMP,e)
  document.getElementById('topEmp').textContent=e.fantasia||e.nome
  toast('Dados da empresa salvos')
}

function imprimirOrcamento(id){
  const o=(DB.get(S.ORC)||[]).find(x=>x.id===id);if(!o)return
  const cli=(DB.get(S.CLI)||[]).find(x=>x.id===o.cliId)||{}
  const e=getEmpresa()
  const infoCells=[]
  if(o.data)infoCells.push({l:'Data',v:fmtDate(o.data)})
  if(o.validade)infoCells.push({l:'Válido até',v:fmtDate(o.validade)})
  if(cli.nome)infoCells.push({l:'Cliente',v:cli.nome})
  if(cli.fone)infoCells.push({l:'Telefone',v:cli.fone})
  if(o.endObra)infoCells.push({l:'Endereço da Obra',v:o.endObra,full:true})
  if(o.resp)infoCells.push({l:'Responsável Técnico',v:o.resp})
  if(o.pgto)infoCells.push({l:'Pagamento',v:o.pgto})

  const cats=[...new Set(o.itens.map(it=>it.cat||'outro'))]
  let rowsHtml='',numGlobal=0
  // Group by category
  cats.forEach(cat=>{
    const items=o.itens.filter(it=>(it.cat||'outro')===cat)
    rowsHtml+=`<tr><td colspan="7" style="background:#EEF4FF;color:#1565C0;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;padding:6px 10px">${catIco(cat)} ${catNome(cat)}</td></tr>`
    items.forEach(it=>{
      numGlobal++
      const attrs=getAttrTagsForPrint(it)
      const locais=(it.locais||[]).map(l=>`<span class="local-tag">${l}</span>`).join(' ')
      rowsHtml+=`<tr>
        <td class="num">${numGlobal}</td>
        <td>${it.nome||'—'}${attrs?`<br>${attrs}`:''}${locais?`<br>${locais}`:''}${it.obs?`<br><span class="obs-item">${it.obs}</span>`:''}</td>
        <td class="qtd">${it.qtd||1}</td>
        <td>${it.un||'un'}</td>
        <td class="pr">${fmtR(it.pu||0)}</td>
        <td class="sub">${fmtR(it.sub||0)}</td>
      </tr>`
    })
  })

  const w=window.open('','_blank','width=900,height=700')
  w.document.write(docHead('ORÇAMENTO')+`
  <div class="doc-title"><div class="t">ORÇAMENTO</div><div class="n">Nº ${orcNumFmt(o.num)}</div></div>
  <div class="info-grid">${infoCells.map(c=>`<div class="ic${c.full?' full':''}"><div class="lbl">${c.l}</div><div class="val">${c.v}</div></div>`).join('')}</div>
  <div class="sec">Itens do Orçamento</div>
  <table><thead><tr><th class="num">#</th><th>Descrição</th><th class="qtd">Qtd.</th><th>Un.</th><th class="pr">Preço Unit.</th><th class="sub">Subtotal</th></tr></thead>
  <tbody>${rowsHtml}</tbody></table>
  <div class="total-box">
    <span>Subtotal: ${fmtR(o.sub||0)}</span>
    ${o.desc?`<span style="color:#FF8A80">Desconto: -${fmtR(o.desc)}</span>`:''}
    <span style="font-size:15px;color:#FFB300">TOTAL: ${fmtR(o.totalF||0)}</span>
  </div>
  ${o.pgto?`<div style="margin-bottom:10px"><strong>Pagamento:</strong> ${o.pgto}</div>`:''}
  ${o.obs?`<div style="background:#FFF8E1;border:1px solid #FFE082;border-radius:6px;padding:10px 14px;font-size:11px;margin-bottom:12px"><strong>Observações:</strong><br>${o.obs}</div>`:''}
  ${(e.obsOrc)?`<div style="font-size:10px;color:#666;margin-bottom:12px">${e.obsOrc}</div>`:''}
  <div class="sigs">
    <div class="sig-box"><div class="sig-line">${e.fantasia||e.nome||'AccertTech'} — Responsável Técnico</div></div>
    <div class="sig-box"><div class="sig-line">Cliente — ${cli.nome||'_____________________'}</div></div>
  </div>
  <div class="footer">Este orçamento é válido até ${fmtDate(o.validade||'')}. Após aprovação, gerar Ordem de Serviço.</div>
  </body></html>`)
  w.document.close();setTimeout(()=>w.print(),600)
}

function getAttrTagsForPrint(p){
  const tags=[]
  if(p.cor)tags.push(`<span class="atag">Cor: ${p.cor}</span>`)
  if(p.botoes)tags.push(`<span class="atag">${p.botoes} botão${p.botoes>1?'ões':''}</span>`)
  if(p.temTomada)tags.push(`<span class="atag">c/ tomada</span>`)
  if(p.wifi)tags.push(`<span class="atag">Wi-Fi</span>`)
  if(p.bitola)tags.push(`<span class="atag">Bitola: ${p.bitola}mm²</span>`)
  if(p.potencia)tags.push(`<span class="atag">${p.potencia}</span>`)
  if(p.tempCor)tags.push(`<span class="atag">${p.tempCor}</span>`)
  if(p.corrente)tags.push(`<span class="atag">${p.corrente}</span>`)
  if(p.polo)tags.push(`<span class="atag">${p.polo}</span>`)
  if(p.tipoServico)tags.push(`<span class="atag">${p.tipoServico}</span>`)
  return tags.join('')
}

// ── Helpers ──
function v(id){const el=document.getElementById(id);return el?el.value:''}

// ── Init ──
function initApp(){
  const e=getEmpresa()
  const u=currentUser()
  // Garante usuário Alvaro cadastrado por padrão
  const cfg=DB.get(S.CFG)||{}
  if(!cfg.users){
    cfg.users=[
      {user:cfg.user||'admin',pass:cfg.pass||'1234',role:'admin',nome:'Admin'},
      {user:'alvaro',pass:'alvaro2026',role:'vendedor',nome:'Alvaro',modules:['orcamentos']}
    ]
    DB.set(S.CFG,cfg)
  }else if(!cfg.users.find(x=>x.user==='alvaro')){
    cfg.users.push({user:'alvaro',pass:'alvaro2026',role:'vendedor',nome:'Alvaro',modules:['orcamentos']})
    DB.set(S.CFG,cfg)
  }
  // Topbar: empresa + usuário logado
  const topEmp=document.getElementById('topEmp')
  if(topEmp)topEmp.textContent=(e.fantasia||e.nome||'AccertTech')+' — '+( u.nome||u.user||'')
  // Restringe menu para não-admin
  if(!isAdmin()){
    document.querySelectorAll('.sb-item').forEach(el=>{
      if(el.id&&el.id!=='sb-orcamentos')el.style.display='none'
    })
    document.querySelectorAll('.sb-sec').forEach(el=>el.style.display='none')
    document.querySelector('.sb-bot').style.display='flex'
  }
  nav(isAdmin()?'dashboard':'orcamentos')
  updateBadges()
  _initFirebase().then(()=>{if(_syncEnabled){nav(_page)}})
}

function updateBadges(){
  const pendentes=(DB.get(S.ORC)||[]).filter(o=>o.status==='enviado').length
  const bo=document.getElementById('bdg-orc')
  if(bo){bo.style.display=pendentes?'':'none';bo.textContent=pendentes}
  const abertas=(DB.get(S.OS)||[]).filter(o=>o.status==='aberta'||o.status==='andamento').length
  const bos=document.getElementById('bdg-os')
  if(bos){bos.style.display=abertas?'':'none';bos.textContent=abertas}
}

let _cfgReady=null
document.addEventListener('DOMContentLoaded',()=>{
  if(sessionStorage.getItem('at_ok')){
    document.getElementById('loginOv').style.display='none'
    document.getElementById('app').style.display='flex'
    initApp()
  }else{
    // Inicia busca do Firebase em background imediatamente
    _cfgReady=_preLoadCfg().catch(e=>{console.warn('preload err:',e)})
    const el=document.getElementById('loginInfo')
    if(el){el.textContent='🔄 Conectando ao Firebase...';el.style.color='#aaa'}
    _cfgReady.then(()=>{
      if(!el)return
      const users=_getUsers()
      if(users.length){
        const admins=users.filter(x=>x.role==='admin')
        const txt=admins.map(x=>x.user+'/'+x.pass).join(' | ')
        el.textContent='✓ Admin(s): '+txt
        el.style.color='#4f4'
      }else{
        el.textContent='⚠ Nenhum usuário encontrado'
        el.style.color='#fa0'
      }
    })
    document.getElementById('loginPass').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin()})
  }
})
